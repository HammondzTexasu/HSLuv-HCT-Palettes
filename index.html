            const rect = wrap.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            let v = min + pct * (max - min);
            if (prop === 'h') v = Math.round(v);
            else v = Math.round(v * 10) / 10;
            return v;
        }

        function pickRampHandle(wrap, prop, clientX) {
            const { min, max } = rampRange(prop);
            const rect = wrap.getBoundingClientRect();
            if (!rect.width) return 'min';
            const x = clientX - rect.left;
            const loVal = parseFloat(wrap.querySelector('.ramp-min').value);
            const hiVal = parseFloat(wrap.querySelector('.ramp-max').value);
            const loX = (valueToTrackPct(loVal, min, max, rect.width) / 100) * rect.width;
            const hiX = (valueToTrackPct(hiVal, min, max, rect.width) / 100) * rect.width;
            return Math.abs(x - loX) <= Math.abs(x - hiX) ? 'min' : 'max';
        }

        function hideRampHints(wrap) {
            if (!wrap) return;
            wrap.querySelector('.ramp-hint-min')?.classList.remove('visible');
            wrap.querySelector('.ramp-hint-max')?.classList.remove('visible');
        }

        function updateRampHints(block, pal, prop) {
            const wrap = block.querySelector(`.slider-ramp-wrap[data-prop="${prop}"]`);
            if (!wrap?.classList.contains('ramp-mode')) return;
            const { min, max } = rampRange(prop);
            const trackW = wrap.getBoundingClientRect().width || 1;
            const lo = parseFloat(wrap.querySelector('.ramp-min').value);
            const hi = parseFloat(wrap.querySelector('.ramp-max').value);
            const hintMin = wrap.querySelector('.ramp-hint-min');
            const hintMax = wrap.querySelector('.ramp-hint-max');
            if (!hintMin || !hintMax) return;
            hintMin.textContent = 'Začátek';
            hintMax.textContent = 'Konec';
            setHintLeftFromCenterPct(hintMin, wrap, valueToTrackPct(lo, min, max, trackW));
            setHintLeftFromCenterPct(hintMax, wrap, valueToTrackPct(hi, min, max, trackW));
        }

        function sliderTrackWidth(wrap) {
            return wrap.getBoundingClientRect().width;
        }

        function refreshPaletteSliderTracks(block, pal) {
            ['h', 's', 'l'].forEach(prop => updateSliderTrack(block, pal, prop));
            if (pal.darkMode) updateSliderTrack(block, pal, 'gain');
        }

        function syncPropPinMarkers(block, pal, prop) {
            const wrap = block.querySelector(`.slider-ramp-wrap[data-prop="${prop}"]`);
            if (!wrap?.classList.contains('pin-ramp-mode')) return;
            const anchors = getPinnedIndices(pal);
            const pinKey = anchors.join(',');
            const pinContainer = wrap.querySelector('.pin-handles');
            if (pinContainer?.dataset.pinKey !== pinKey) {
                renderPinMarkers(block, pal, prop);
            } else {
                updatePinMarkerPositions(block, pal, prop);
            }
        }

        let sliderTrackRefreshRaf = 0;
        function scheduleSliderTrackRefresh() {
            cancelAnimationFrame(sliderTrackRefreshRaf);
            sliderTrackRefreshRaf = requestAnimationFrame(() => {
                sliderTrackRefreshRaf = requestAnimationFrame(() => {
                    sliderTrackRefreshRaf = 0;
                    document.querySelectorAll('.palette-block').forEach(block => {
                        const pi = parseInt(block.dataset.paletteIndex, 10);
                        const pal = palettes[pi];
                        if (pal) refreshPaletteSliderTracks(block, pal);
                    });
                });
            });
        }

        let sliderTrackResizeObserver = null;
        function getSliderTrackResizeObserver() {
            if (!sliderTrackResizeObserver && typeof ResizeObserver !== 'undefined') {
                sliderTrackResizeObserver = new ResizeObserver(entries => {
                    for (const entry of entries) {
                        const wrap = entry.target;
                        const block = wrap.closest('.palette-block');
                        const pi = parseInt(block?.dataset.paletteIndex, 10);
                        const pal = palettes[pi];
                        const prop = wrap.dataset.prop;
                        if (!block || !pal || !prop) continue;
                        updateSliderTrack(block, pal, prop);
                        if (wrap.classList.contains('pin-ramp-mode')) {
                            updatePinMarkerPositions(block, pal, prop);
                        }
                    }
                });
            }
            return sliderTrackResizeObserver;
        }

        function observeSliderTracks(block) {
            const ro = getSliderTrackResizeObserver();
            if (!ro) return;
            block.querySelectorAll('.slider-ramp-wrap').forEach(wrap => ro.observe(wrap));
        }

        function updateSliderTrack(block, pal, prop) {
            const wrap = block.querySelector(`.slider-ramp-wrap[data-prop="${prop}"]`);
            if (!wrap) return;
            const { min, max } = rampRange(prop);
            const span = max - min || 1;
            const fill = wrap.querySelector('.track-fill');
            if (wrap.classList.contains('slider-inactive')) {
                hideRampHints(wrap);
                if (prop === 's') wrap.classList.remove('hct-chroma-cap');
                return;
            }
            if (prop === 's' && !useHctChromaCap(pal, wrap)) {
                wrap.classList.remove('hct-chroma-cap');
            }
            if (wrap.classList.contains('pin-ramp-mode')) {
                hideRampHints(wrap);
                const anchors = getPinnedIndices(pal);
                const trackW = sliderTrackWidth(wrap);
                if (trackW < 1) return;
                if (anchors.length >= 2) {
                    const v0 = pal.steps[anchors[0]][prop];
                    const vN = pal.steps[anchors[anchors.length - 1]][prop];
                    const p0 = valueToTrackPct(v0, min, max, trackW);
                    const pN = valueToTrackPct(vN, min, max, trackW);
                    fill.style.left = Math.min(p0, pN) + '%';
                    fill.style.width = Math.abs(pN - p0) + '%';
                } else {
                    fill.style.left = '0%';
                    fill.style.width = '0%';
                }
                return;
            }
            if (wrap.classList.contains('ramp-mode')) {
                const lo = parseFloat(wrap.querySelector('.ramp-min').value);
                const hi = parseFloat(wrap.querySelector('.ramp-max').value);
                const fillLo = Math.min(lo, hi);
                const fillHi = Math.max(lo, hi);
                const trackW = sliderTrackWidth(wrap);
                if (trackW < 1) return;
                const pLo = valueToTrackPct(fillLo, min, max, trackW);
                const pHi = valueToTrackPct(fillHi, min, max, trackW);
                fill.style.left = Math.min(pLo, pHi) + '%';
                fill.style.width = Math.abs(pHi - pLo) + '%';
                updateRampHints(block, pal, prop);
            } else {
                hideRampHints(wrap);
                const useCap = useHctChromaCap(pal, wrap);
                wrap.classList.toggle('hct-chroma-cap', useCap);
                const avail = wrap.querySelector('.track-available');
                const dead = wrap.querySelector('.track-dead');
                if (useCap) {
                    const step = pal.steps[pal.selected];
                    const cap = maxHctChroma(step.h, step.l);
                    const s = Math.min(step.s, cap);
                    const pS = ((s - min) / span) * 100;
                    const pCap = ((cap - min) / span) * 100;
                    fill.style.left = '0%';
                    fill.style.width = Math.max(0, pS) + '%';
                    if (avail) {
                        avail.style.left = pS + '%';
                        avail.style.width = Math.max(0, pCap - pS) + '%';
                    }
                    if (dead) {
                        dead.style.left = pCap + '%';
                        dead.style.width = Math.max(0, 100 - pCap) + '%';
                    }
                } else {
                    const v = parseFloat(wrap.querySelector('.ramp-single').value);
                    fill.style.left = '0%';
                    fill.style.width = Math.max(0, ((v - min) / span) * 100) + '%';
                }
            }
        }

        function updateSliderMode(block, pal) {
            const whole = pal.selected === null;
            const anchorMode = isAnchorMode(pal);
            ['h', 's', 'l'].forEach(prop => {
                const wrap = block.querySelector(`.slider-ramp-wrap[data-prop="${prop}"]`);
                if (!wrap) return;
                const pinOn = usePropPinHandles(pal, prop);
                let rampOn = false;
                if (prop === 'l') {
                    rampOn = whole && pal.lInterp && !pinOn;
                } else {
                    const ramp = prop === 'h' ? pal.hRamp : pal.sRamp;
                    const endpointMode = anchorMode && !hsPinViewEnabled(pal, prop);
                    rampOn = whole && !pinOn && (ramp || endpointMode);
                }
                wrap.classList.toggle('pin-ramp-mode', pinOn);
                wrap.classList.toggle('ramp-mode', rampOn);
                if (!rampOn) hideRampHints(wrap);
                if (!pinOn) hidePinHints(wrap);
                if (pinOn) syncPropPinMarkers(block, pal, prop);
                updateSliderTrack(block, pal, prop);
            });
        }

        function updateSliderInactive(block, pal) {
            const whole = pal.selected === null;
            const anchorMode = isAnchorMode(pal);
            const sel = pal.selected;
            const step = sel != null ? pal.steps[sel] : null;
            const hsInactive = anchorMode && sel !== null && !step?.pinned;
            const lInactive = whole && !pal.lInterp;

            ['h', 's', 'l'].forEach(prop => {
                const wrap = block.querySelector(`.slider-ramp-wrap[data-prop="${prop}"]`);
                if (!wrap) return;
                const inactive = prop === 'l' ? lInactive : hsInactive;
                wrap.classList.toggle('slider-inactive', inactive);
            });
            const inputH = block.querySelector('.input-h');
            const inputS = block.querySelector('.input-s');
            const inputL = block.querySelector('.input-l');
            if (inputH) inputH.disabled = hsInactive;
            if (inputS) inputS.disabled = hsInactive;
            if (inputL) inputL.disabled = lInactive;
            const labelL = block.querySelector('.label-l');
            labelL?.classList.toggle('l-await-interp', lInactive);
            labelL?.classList.toggle('l-interp-on', pal.lInterp);
            labelL?.classList.toggle('l-has-pins', hasPalettePins(pal));
            labelL?.classList.toggle('slider-whole', whole);
            const labelH = block.querySelector('.label-h');
            labelH?.classList.toggle('has-pins', anchorMode);
            labelH?.classList.toggle('slider-whole', whole);
            const labelS = block.querySelector('.label-s');
            labelS?.classList.toggle('has-pins', anchorMode);
            labelS?.classList.toggle('slider-whole', whole);
        }

        function updateEditorSliderClasses(block, pal) {
            const editor = block.querySelector('.palette-editor');
            if (!editor) return;
            const anchorMode = isAnchorMode(pal);
            const sel = pal.selected;
            const step = sel != null ? pal.steps[sel] : null;
            const canEditHS = sel != null && (!anchorMode || !!step?.pinned);
            editor.classList.toggle('anchor-mode', anchorMode);
            editor.classList.toggle('accent-hs', canEditHS);
            editor.classList.toggle('accent-l', sel != null);
        }

        function syncEditor(block, pal) {
            const inputL = block.querySelector('.input-l');

            updateSliderMode(block, pal);
            updateEditorSliderClasses(block, pal);
            updateSliderInactive(block, pal);
            updateValEditableState(block, pal);
            syncPinViewToggleButtons(block, pal);

            if (pal.selected === null) {
                const ref = pal.steps[0];
                if (!ref) return;
                inputL.value = ref.l;

                if (pal.lInterp) {
                    if (useLPinHandles(pal)) {
                        updatePinValDisplay(block, pal, 'l');
                    } else {
                        const { start, end } = rampSliderValues(pal, 'l');
                        const lWrap = block.querySelector('.slider-ramp-wrap[data-prop="l"]');
                        lWrap.querySelector('.ramp-min').value = start;
                        lWrap.querySelector('.ramp-max').value = end;
                        setValDisplay(block, pal, 'l',
                            [start.toFixed(1), end.toFixed(1)], '–');
                    }
                } else {
                    setValDisplay(block, pal, 'l', [ref.l.toFixed(1)]);
                }
                updateSliderTrack(block, pal, 'l');

                if (usePropPinHandles(pal, 'h')) {
                    updatePinValDisplay(block, pal, 'h');
                    updateSliderTrack(block, pal, 'h');
                } else if (pal.hRamp || (isAnchorMode(pal) && !hsPinViewEnabled(pal, 'h'))) {
                    const { start, end } = rampSliderValues(pal, 'h');
                    const wrap = block.querySelector('.slider-ramp-wrap[data-prop="h"]');
                    wrap.querySelector('.ramp-min').value = start;
                    wrap.querySelector('.ramp-max').value = end;
                    setValDisplay(block, pal, 'h',
                        [`${Math.round(start)}°`, `${Math.round(end)}°`], '–');
                    updateSliderTrack(block, pal, 'h');
                } else {
                    block.querySelector('.input-h').value = ref.h;
                    setValDisplay(block, pal, 'h', [`${Math.round(ref.h)}°`]);
                    updateSliderTrack(block, pal, 'h');
                }

                if (usePropPinHandles(pal, 's')) {
                    updatePinValDisplay(block, pal, 's');
                    updateSliderTrack(block, pal, 's');
                } else if (pal.sRamp || (isAnchorMode(pal) && !hsPinViewEnabled(pal, 's'))) {
                    const { start, end } = rampSliderValues(pal, 's');
                    const wrap = block.querySelector('.slider-ramp-wrap[data-prop="s"]');
                    wrap.querySelector('.ramp-min').value = start;
                    wrap.querySelector('.ramp-max').value = end;
                    setValDisplay(block, pal, 's',
                        [start.toFixed(1), end.toFixed(1)], '–');
                    updateSliderTrack(block, pal, 's');
                } else {
                    block.querySelector('.input-s').value = ref.s;
                    setValDisplay(block, pal, 's', [ref.s.toFixed(1)]);
                    updateSliderTrack(block, pal, 's');
                }
                return;
            }

            const step = pal.steps[pal.selected];
            if (!step) return;
            syncStepHctChroma(step);
            const sDisplay = step.s;
            block.querySelector('.input-h').value = step.h;
            block.querySelector('.input-s').value = sDisplay;
            inputL.value = step.l;
            setValDisplay(block, pal, 'h', [`${Math.round(step.h)}°`]);
            setValDisplay(block, pal, 's', [sDisplay.toFixed(1)]);
            setValDisplay(block, pal, 'l', [step.l.toFixed(1)]);
            updateSliderTrack(block, pal, 'h');
            updateSliderTrack(block, pal, 's');
            updateSliderTrack(block, pal, 'l');
        }

        function toggleRamp(block, pal, prop) {
            if (pal.selected !== null) return;
            if (isAnchorMode(pal)) {
                if (prop === 'h' && hsPinViewEnabled(pal, 'h')) return;
                if (prop === 's' && hsPinViewEnabled(pal, 's')) return;
            }
            pushHistory();
            const key = prop === 'h' ? 'hRamp' : 'sRamp';
            pal[key] = !pal[key];
            if (pal[key]) {
                ensureInterpCurvesForPalette(pal, prop);
                setSelection(pal, null);
                applyPropRamp(pal, prop);
            } else {
                hideRampHints(block.querySelector(`.slider-ramp-wrap[data-prop="${prop}"]`));
            }
            syncEditor(block, pal);
            updateSwatches(block, pal);
            if (isPrimaryPalette(pal)) afterPrimaryPaletteChange();
        }

        function onRampSlider(block, pal, prop, which, raw) {
            const n = pal.steps.length;
            if (n < 2) return;
            const { min: rMin, max: rMax } = rampRange(prop);
            let v = parseFloat(raw);
            if (prop === 'h') v = Math.max(0, Math.min(360, v));
            else v = Math.max(rMin, Math.min(rMax, v));

            const wrap = block.querySelector(`.slider-ramp-wrap[data-prop="${prop}"]`);
            const minIn = wrap.querySelector('.ramp-min');
            const maxIn = wrap.querySelector('.ramp-max');

            if (prop === 'l') {
                if (!pal.lInterp || useLPinHandles(pal)) return;
                if (which === 'min') pal.steps[0].l = v;
                else pal.steps[n - 1].l = v;
                minIn.value = pal.steps[0].l;
                maxIn.value = pal.steps[n - 1].l;
                applyPropRamp(pal, 'l');
            } else {
                if (isAnchorMode(pal) && usePropPinHandles(pal, prop)) return;
                if (which === 'min') pal.steps[0][prop] = v;
                else pal.steps[n - 1][prop] = v;
                minIn.value = pal.steps[0][prop];
                maxIn.value = pal.steps[n - 1][prop];
                applyPropRamp(pal, prop);
            }
            syncEditor(block, pal);
            updateSwatches(block, pal);
            if (isPrimaryPalette(pal)) afterPrimaryPaletteChange();
        }

        function endValEditDom(block, pal) {
            block?.querySelectorAll('.val-input').forEach(el => el.remove());
            if (pal) pal.valEdit = null;
        }

        function canEditSliderVal(block, pal, prop) {
            if (prop === 'gain') return pal.darkMode;
            const wrap = block.querySelector(`.slider-ramp-wrap[data-prop="${prop}"]`);
            if (!wrap || wrap.classList.contains('slider-inactive')) return false;
            if (prop === 'l' && pal.selected === null && !pal.lInterp) return false;
            const anchorMode = isAnchorMode(pal);
            const sel = pal.selected;
            const step = sel != null ? pal.steps[sel] : null;
            if ((prop === 'h' || prop === 's') && anchorMode && sel !== null && !step?.pinned) {
                return false;
            }
            return true;
        }

        function isValEditingProp(pal, prop) {
            return pal.valEdit != null && pal.valEdit.prop === prop;
        }

        function clampSliderVal(prop, n) {
            if (prop === 'gain') return clampGain(n);
            if (prop === 'h') return Math.round(Math.max(0, Math.min(360, n)));
            return Math.round(Math.max(0, Math.min(100, n)) * 10) / 10;
        }

        function renderValSegments(block, pal, prop, parts, sep) {
            const wrap = block.querySelector(`.val-wrap[data-prop="${prop}"]`);
            if (!wrap) return;
            wrap.replaceChildren();
            parts.forEach((text, idx) => {
                if (idx > 0 && sep) {
                    const sepEl = document.createElement('span');
                    sepEl.className = 'val-sep';
                    sepEl.textContent = ` ${sep} `;
                    wrap.appendChild(sepEl);
                }
                const seg = document.createElement('span');
                seg.className = 'val-segment';
                seg.dataset.idx = String(idx);
                seg.textContent = text;
                wrap.appendChild(seg);
            });
        }

        function setValDisplay(block, pal, prop, parts, sep = null) {
            if (isValEditingProp(pal, prop)) return;
            const arr = Array.isArray(parts) ? parts : [parts];
            const multi = arr.length > 1;
            renderValSegments(block, pal, prop, arr, multi ? sep : null);
        }

        function updateValEditableState(block, pal) {
            ['h', 's', 'l', 'gain'].forEach(prop => {
                const wrap = block.querySelector(`.val-wrap[data-prop="${prop}"]`);
                if (wrap) wrap.classList.toggle('val-editable', canEditSliderVal(block, pal, prop));
            });
        }

        function applyValSegment(block, pal, prop, idx, raw) {
            const n = parseFloat(String(raw).replace(/°/g, '').trim());
            if (Number.isNaN(n)) return false;
            const v = clampSliderVal(prop, n);
            pushHistory();

            if (prop === 'h') {
                if (pal.selected !== null) {
                    onSlider(block, pal, 'h', String(v));
                    return true;
                }
                if (usePropPinHandles(pal, 'h')) {
                    onPinSlider(block, pal, 'h', idx, String(v));
                    return true;
                }
                if (pal.hRamp || (isAnchorMode(pal) && !hsPinViewEnabled(pal, 'h'))) {
                    onRampSlider(block, pal, 'h', idx === 0 ? 'min' : 'max', String(v));
                    return true;
                }
                onSlider(block, pal, 'h', String(v));
                return true;
            }
            if (prop === 's') {
                if (pal.selected !== null) {
                    onSlider(block, pal, 's', String(v));
                    return true;
                }
                if (usePropPinHandles(pal, 's')) {
                    onPinSlider(block, pal, 's', idx, String(v));
                    return true;
                }
                if (pal.sRamp || (isAnchorMode(pal) && !hsPinViewEnabled(pal, 's'))) {
                    onRampSlider(block, pal, 's', idx === 0 ? 'min' : 'max', String(v));
                    return true;
                }
                onSlider(block, pal, 's', String(v));
                return true;
            }
            if (prop === 'l') {
                if (pal.selected !== null) {
                    onSlider(block, pal, 'l', String(v));
                    return true;
                }
                if (pal.lInterp && useLPinHandles(pal)) {
                    onPinSlider(block, pal, 'l', idx, String(v));
                    return true;
                }
                if (pal.lInterp) {
                    onRampSlider(block, pal, 'l', idx === 0 ? 'min' : 'max', String(v));
                    return true;
                }
                onSlider(block, pal, 'l', String(v));
                return true;
            }
            if (prop === 'gain') {
                if (pal.dmGainRamp) {
                    onDmGainRampSlider(block, pal, idx === 0 ? 'min' : 'max', String(v));
                } else {
                    onDmGainSlider(block, pal, String(v));
                }
                return true;
            }
            return false;
        }

        function startValEdit(block, pal, prop, idx) {
            if (!canEditSliderVal(block, pal, prop)) return;
            endValEditDom(block, pal);
            const valWrap = block.querySelector(`.val-wrap[data-prop="${prop}"]`);
            const seg = valWrap?.querySelector(`.val-segment[data-idx="${idx}"]`);
            if (!valWrap || !seg) return;

            pal.valEdit = { prop, idx };
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'val-input';
            input.value = seg.textContent.replace(/°/g, '').trim();
            input.spellcheck = false;
            input.autocomplete = 'off';
            input.inputMode = 'decimal';

            let done = false;
            const teardown = () => {
                if (done) return;
                done = true;
                input.remove();
                pal.valEdit = null;
            };
            const commit = () => {
                if (done) return;
                const raw = input.value;
                teardown();
                if (!applyValSegment(block, pal, prop, idx, raw)) {
                    syncEditor(block, pal);
                }
            };
            const cancel = () => {
                teardown();
                syncEditor(block, pal);
            };

            input.addEventListener('keydown', (e) => {
                e.stopPropagation();
                if (e.key === 'Enter') {
                    e.preventDefault();
                    commit();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    cancel();
                }
            });
            input.addEventListener('blur', () => {
                requestAnimationFrame(() => {
                    if (done) return;
                    commit();
                });
            });
            input.addEventListener('click', (e) => e.stopPropagation());
            input.addEventListener('pointerdown', (e) => e.stopPropagation());

            seg.appendChild(input);
            input.focus();
            input.select();
        }

        function deselectPalette(block, pal) {
            const hadSel = pal.selected !== null;
            const hadEdit = pal.hexEditIndex != null;
            const hadValEdit = pal.valEdit != null;
            const hadContrastEdit = pal.contrastEditIndex != null;
            if (!hadSel && !hadEdit && !hadValEdit && !hadContrastEdit) return;
            cancelHexEdit(pal);
            cancelContrastEdit(pal);
            endValEditDom(block, pal);
            setSelection(pal, null);
            updateSwatches(block, pal);
            syncEditor(block, pal);
        }

        function onSlider(block, pal, prop, raw) {
            const v = parseFloat(raw);
            const anchorMode = isAnchorMode(pal);
            if (pal.selected === null) {
                if (prop === 'l') return;
                if (anchorMode) return;
                if ((prop === 'h' && pal.hRamp) || (prop === 's' && pal.sRamp)) return;
                pal.steps.forEach(step => { step[prop] = v; });
                refreshStepHex(pal);
            } else {
                const step = pal.steps[pal.selected];
                if (prop === 'l') {
                    exitLInterp(pal);
                    const lv = clampSliderVal('l', v);
                    if (pal.darkMode) {
                        const si = pal.selected;
                        const g = dmGainAtIndex(pal, si);
                        if (!pal.dmBaseL) pal.dmBaseL = [];
                        pal.dmBaseL[si] = clampSliderVal('l', lv - g);
                        step.l = clampSliderVal('l', pal.dmBaseL[si] + g);
                    } else {
                        step.l = lv;
                    }
                    syncStepHctChroma(step);
                    step.hex = modelToHex(step.h, step.s, step.l) ?? step.hex;
                } else if (anchorMode) {
                    if (!step.pinned) return;
                    if (prop === 's') step.s = clampHctChromaForStep(step.h, v, step.l);
                    else step[prop] = clampSliderVal(prop, v);
                    if (prop === 'h' || prop === 'l') syncStepHctChroma(step);
                    if (prop === 'h' || prop === 's') applyAnchorInterpProp(pal, prop);
                    else step.hex = modelToHex(step.h, step.s, step.l) ?? step.hex;
                } else {
                    if (prop === 'h') step.h = clampSliderVal('h', v);
                    else if (prop === 's') step.s = clampHctChromaForStep(step.h, v, step.l);
                    if (prop === 'h') syncStepHctChroma(step);
                    step.hex = modelToHex(step.h, step.s, step.l) ?? step.hex;
                }
            }
            syncEditor(block, pal);
            updateSwatches(block, pal);
            if (isPrimaryPalette(pal)) afterPrimaryPaletteChange();
        }

        function buildPaletteBlock(pal, pi) {
            const block = document.createElement('div');
            block.className = 'palette-block';
            block.dataset.paletteIndex = String(pi);

            const toolbar = document.createElement('div');
            toolbar.className = 'palette-toolbar';

            const paletteField = document.createElement('label');
            paletteField.className = 'toolbar-field';
            paletteField.append('Barva palety');
            const paletteWrap = document.createElement('div');
            paletteWrap.className = 'input-with-swatch';
            const hexInput = document.createElement('input');
            hexInput.type = 'text';
            hexInput.placeholder = 'RRGGBB';
            hexInput.value = toolbarHexDisplay(pal.baseHex);
            paletteWrap.appendChild(hexInput);
            paletteField.appendChild(paletteWrap);

            const bgField = document.createElement('label');
            bgField.className = 'toolbar-field';
            bgField.append('Barva pozadí');
            const bgWrap = document.createElement('div');
            bgWrap.className = 'input-with-swatch has-extra';
            const bgInput = document.createElement('input');
            bgInput.type = 'text';
            bgInput.placeholder = 'RRGGBB';
            bgInput.value = toolbarHexDisplay(pal.bgHex);
            const bgEye = document.createElement('button');
            bgEye.type = 'button';
            bgEye.className = 'bg-eye' + (pal.bgPreview ? ' active' : '');
            bgEye.title = 'Náhled pozadí';
            bgEye.appendChild(eyeSvg());
            bgEye.onclick = () => {
                pal.bgPreview = !pal.bgPreview;
                bgEye.classList.toggle('active', pal.bgPreview);
                applyBgPreview(block, pal);
            };
            bgWrap.append(bgInput, bgEye);
            bgField.appendChild(bgWrap);

            attachToolbarColorSwatch(hexInput, (hex) => {
                pal.baseHex = hex;
            });
            attachToolbarColorSwatch(
                bgInput,
                (hex) => {
                    pal.bgHex = hex;
                    applyBgPreview(block, pal);
                },
                () => commitToolbarBgChange(block, pal, pi)
            );
            wireToolbarHexInput(hexInput, (hex) => { pal.baseHex = hex; });
            let bgHexCommitTimer = 0;
            wireToolbarHexInput(bgInput, (hex) => {
                pal.bgHex = hex;
                applyBgPreview(block, pal);
                syncToolbarBgSwatch(block, pal);
                clearTimeout(bgHexCommitTimer);
                bgHexCommitTimer = setTimeout(
                    () => commitToolbarBgChange(block, pal, pi),
                    150
                );
            });

            const generateBtn = document.createElement('button');
            generateBtn.type = 'button';
            generateBtn.textContent = 'Generovat paletu';

            generateBtn.onclick = () => {
                const baseNorm = normalizeHex(hexInput.value);
                const bgNorm = normalizeHex(bgInput.value);
                if (!baseNorm) {
                    hexInput.classList.add('error');
                    setTimeout(() => hexInput.classList.remove('error'), 600);
                    return;
                }
                if (!bgNorm) {
                    bgInput.classList.add('error');
                    setTimeout(() => bgInput.classList.remove('error'), 600);
                    return;
                }
                pal.baseHex = baseNorm;
                pal.bgHex = bgNorm;
                hexInput.value = baseNorm.slice(1);
                bgInput.value = bgNorm.slice(1);
                if (!hexToModel(pal.baseHex)) {
                    hexInput.classList.add('error');
                    setTimeout(() => hexInput.classList.remove('error'), 600);
                    return;
                }
                hexInput.classList.remove('error');
                bgInput.classList.remove('error');
                pushHistory();
                generatePalette(pal, true);
                if (pal.darkMode) {
                    syncDarkModePaletteFromPrimary(pal, false);
                } else if (isPrimaryPalette(pal)) {
                    afterPrimaryPaletteChange();
                }
                updateSwatches(block, pal);
                syncEditor(block, pal);
                applyBgPreview(block, pal);
            };

            hexInput.onkeydown = e => { if (e.key === 'Enter') generateBtn.click(); };
            bgInput.onkeydown = e => { if (e.key === 'Enter') generateBtn.click(); };

            if (pi > 0) {
                const darkModeBtn = document.createElement('button');
                darkModeBtn.type = 'button';
                darkModeBtn.className = 'dark-mode-btn' + (pal.darkMode ? ' active' : '');
                darkModeBtn.textContent = 'Dark Mode';
                darkModeBtn.onclick = () => setDarkMode(block, pal, !pal.darkMode, bgInput, darkModeBtn);

                const dmContrastMetricField = document.createElement('div');
                dmContrastMetricField.className = 'toolbar-field dm-contrast-metric-field' +
                    (pal.darkMode ? '' : ' dm-gain-hidden');
                dmContrastMetricField.hidden = !pal.darkMode;
                dmContrastMetricField.append('Kontrast');
                const dmMetricBtns = document.createElement('div');
                dmMetricBtns.className = 'color-space-toggle-btns';
                [['wcag', 'WCAG'], ['apca', 'APCA']].forEach(([id, text]) => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.dataset.dmMetric = id;
                    btn.textContent = text;
                    btn.classList.toggle('active', dmMetric(pal) === id);
                    btn.onclick = () => setDmContrastMetric(block, pal, id);
                    dmMetricBtns.appendChild(btn);
                });
                dmContrastMetricField.appendChild(dmMetricBtns);

                const dmGainField = document.createElement('label');
                dmGainField.className = 'toolbar-field dm-gain-field' +
                    (pal.darkMode ? '' : ' dm-gain-hidden');
                dmGainField.hidden = !pal.darkMode;
                dmGainField.innerHTML = `
                    <span class="slider-top"><span>Gain</span><span class="val-wrap" data-prop="gain"></span></span>
                    <div class="slider-ramp-wrap" data-prop="gain" title="Alt+klik: rampa začátek–konec">
                        <span class="ramp-hint ramp-hint-min"></span>
                        <span class="ramp-hint ramp-hint-max"></span>
                        <div class="track-bg"></div>
                        <div class="track-fill"></div>
                        <input type="range" class="input-gain ramp-single" min="0" max="100" step="1">
                        <input type="range" class="ramp-min ramp-handle" min="0" max="100" step="1">
                        <input type="range" class="ramp-max ramp-handle" min="0" max="100" step="1">
                    </div>
                `;
                const gainWrap = dmGainField.querySelector('.slider-ramp-wrap[data-prop="gain"]');
                const gainHintMin = gainWrap.querySelector('.ramp-hint-min');
                const gainHintMax = gainWrap.querySelector('.ramp-hint-max');
                if (gainHintMin) gainHintMin.textContent = 'Začátek';
                if (gainHintMax) gainHintMax.textContent = 'Konec';
                let gainAltClick = false;
                let gainDragMoved = false;
                let gainRampDrag = null;

                const showGainRampHint = (which) => {
                    if (!gainHintMin || !gainHintMax) return;
                    gainHintMin.classList.toggle('visible', which === 'min');
                    gainHintMax.classList.toggle('visible', which === 'max');
                };

                gainWrap.querySelectorAll('.ramp-min, .ramp-max, .input-gain').forEach(inp => {
                    inp.addEventListener('pointerdown', (e) => {
                        if (e.button !== 0) e.preventDefault();
                    });
                    inp.addEventListener('contextmenu', (e) => e.preventDefault());
                });

                gainWrap.addEventListener('pointerdown', (e) => {
                    if (e.button !== 0) return;
                    gainAltClick = e.altKey;
                    gainDragMoved = false;
                    if (e.altKey) return;
                    if (!pal.darkMode) return;
                    if (gainWrap.classList.contains('ramp-mode')) {
                        historyDragStart();
                        e.preventDefault();
                        gainRampDrag = pickRampHandle(gainWrap, 'gain', e.clientX);
                        gainDragMoved = true;
                        gainWrap.setPointerCapture(e.pointerId);
                        onDmGainRampSlider(block, pal, gainRampDrag,
                            String(valueFromPointer(gainWrap, 'gain', e.clientX)));
                        return;
                    }
                    if (e.target.closest('input')) {
                        historyDragStart();
                        const onMove = () => { gainDragMoved = true; };
                        document.addEventListener('pointermove', onMove);
                        document.addEventListener('pointerup', () => {
                            document.removeEventListener('pointermove', onMove);
                        }, { once: true });
                    }
                });
                gainWrap.addEventListener('pointermove', (e) => {
                    if (!gainWrap.classList.contains('ramp-mode')) {
                        showGainRampHint(null);
                        return;
                    }
                    if (gainRampDrag === null) {
                        showGainRampHint(pickRampHandle(gainWrap, 'gain', e.clientX));
                    }
                    if (!gainRampDrag) return;
                    onDmGainRampSlider(block, pal, gainRampDrag,
                        String(valueFromPointer(gainWrap, 'gain', e.clientX)));
                });
                gainWrap.addEventListener('pointerleave', () => showGainRampHint(null));
                gainWrap.addEventListener('pointerup', () => {
                    gainRampDrag = null;
                });
                gainWrap.addEventListener('lostpointercapture', () => {
                    gainRampDrag = null;
                });
                gainWrap.addEventListener('click', (e) => {
                    if (!gainAltClick || gainDragMoved || !pal.darkMode) return;
                    e.preventDefault();
                    toggleDmGainRamp(block, pal);
                });

                gainWrap.addEventListener('contextmenu', (e) => {
                    showInterpContextMenu(e, block, pal, gainWrap, 'gain');
                });

                dmGainField.querySelector('.input-gain').oninput = e =>
                    onDmGainSlider(block, pal, e.target.value);
                gainWrap.querySelector('.ramp-min').oninput = e =>
                    onDmGainRampSlider(block, pal, 'min', e.target.value);
                gainWrap.querySelector('.ramp-max').oninput = e =>
                    onDmGainRampSlider(block, pal, 'max', e.target.value);

                dmGainField.querySelector('.val-wrap[data-prop="gain"]').addEventListener('click', (e) => {
                    const seg = e.target.closest('.val-segment');
                    if (!seg || !pal.darkMode) return;
                    e.preventDefault();
                    e.stopPropagation();
                    const idx = parseInt(seg.dataset.idx, 10);
                    if (pal.valEdit?.prop === 'gain' && pal.valEdit?.idx === idx && seg.querySelector('.val-input')) {
                        return;
                    }
                    startValEdit(block, pal, 'gain', idx);
                });

                toolbar.append(
                    paletteField, bgField, generateBtn, darkModeBtn, dmContrastMetricField, dmGainField
                );
                syncDmGainUi(block, pal);
                syncDmContrastMetricUi(block, pal);
            } else {
                toolbar.append(paletteField, bgField, generateBtn);
            }
            if (pi === 0) {
                toolbar.prepend(buildColorSpaceField());
                toolbar.prepend(buildHistoryControls());
            }

            const main = document.createElement('div');
            main.className = 'palette-main';
            const preview = document.createElement('div');
            preview.className = 'palette-preview';
            const row = document.createElement('div');
            row.className = 'palette-row';
            const ctrl = document.createElement('div');
            ctrl.className = 'steps-ctrl';
            const stepsGrow = document.createElement('div');
            stepsGrow.className = 'steps-grow';

            const addBtn = document.createElement('button');
            addBtn.type = 'button';
            addBtn.className = 'ghost fill-v';
            addBtn.title = 'Přidat krok';
            addBtn.textContent = '+';
            addBtn.onclick = () => {
                if (sharedStepCount >= 24) return;
                setSharedStepCount(sharedStepCount + 1);
            };

            const count = document.createElement('span');
            count.className = 'step-count';
            count.textContent = sharedStepCount;

            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'ghost fill-v';
            removeBtn.title = 'Odebrat krok';
            removeBtn.textContent = '−';
            removeBtn.onclick = () => {
                if (sharedStepCount <= 2) return;
                setSharedStepCount(sharedStepCount - 1);
            };

            stepsGrow.append(addBtn, count, removeBtn);

            const addPalBtn = document.createElement('button');
            addPalBtn.type = 'button';
            addPalBtn.className = 'ghost';
            addPalBtn.textContent = '+';
            addPalBtn.title = 'Přidat paletu';
            addPalBtn.onclick = addPalette;

            if (pi > 0) {
                const delBtn = document.createElement('button');
                delBtn.type = 'button';
                delBtn.className = 'ghost danger';
                delBtn.textContent = '−';
                delBtn.title = 'Smazat paletu';
                delBtn.onclick = () => {
                    pushHistory();
                    palettes.splice(pi, 1);
                    render();
                };
                ctrl.append(delBtn, stepsGrow, addPalBtn);
            } else {
                ctrl.append(stepsGrow, addPalBtn);
            }

            preview.appendChild(row);
            main.append(preview, ctrl);

            const editor = document.createElement('div');
            editor.className = 'palette-editor';
            editor.innerHTML = `
                <div class="sliders">
                    <div class="label-h slider-prop-label">
                        <span class="slider-top"><span class="slider-axis slider-axis-h">Hue</span><span class="val-wrap" data-prop="h"></span></span>
                        <div class="prop-slider-stack">
                            <div class="pin-mode-toggle" data-prop="h">
                                <button type="button" class="pin-view-btn" data-prop="h">Bez pinů</button>
                            </div>
                            <div class="slider-ramp-wrap" data-prop="h" title="Alt+klik: rampa začátek–konec">
                                <span class="ramp-hint ramp-hint-min"></span>
                                <span class="ramp-hint ramp-hint-max"></span>
                                <div class="pin-handles"></div>
                                <div class="track-bg"></div>
                                <div class="track-fill"></div>
                                <input type="range" class="input-h ramp-single" min="0" max="360" step="1">
                                <input type="range" class="ramp-min ramp-handle" min="0" max="360" step="1">
                                <input type="range" class="ramp-max ramp-handle" min="0" max="360" step="1">
                            </div>
                        </div>
                    </div>
                    <div class="label-s slider-prop-label">
                        <span class="slider-top"><span class="slider-axis slider-axis-s">Saturation</span><span class="val-wrap" data-prop="s"></span></span>
                        <div class="prop-slider-stack">
                            <div class="pin-mode-toggle" data-prop="s">
                                <button type="button" class="pin-view-btn" data-prop="s">Bez pinů</button>
                            </div>
                            <div class="slider-ramp-wrap" data-prop="s" title="Alt+klik: rampa začátek–konec">
                                <span class="ramp-hint ramp-hint-min"></span>
                                <span class="ramp-hint ramp-hint-max"></span>
                                <div class="pin-handles"></div>
                                <div class="track-bg"></div>
                                <div class="track-available"></div>
                                <div class="track-dead"></div>
                                <div class="track-fill"></div>
                                <input type="range" class="input-s ramp-single" min="0" max="100" step="0.1">
                                <input type="range" class="ramp-min ramp-handle" min="0" max="100" step="0.1">
                                <input type="range" class="ramp-max ramp-handle" min="0" max="100" step="0.1">
                            </div>
                        </div>
                    </div>
                    <div class="label-l">
                        <span class="slider-top"><span class="slider-axis slider-axis-l">Lightness</span><span class="val-wrap" data-prop="l"></span></span>
                        <div class="l-slider-stack">
                            <div class="l-pin-mode-toggle">
                                <button type="button" class="pin-view-btn" data-prop="l">Bez pinů</button>
                            </div>
                            <button type="button" class="l-interpolate-cta">Interpolovat</button>
                            <div class="slider-ramp-wrap" data-prop="l">
                                <span class="ramp-hint ramp-hint-min"></span>
                                <span class="ramp-hint ramp-hint-max"></span>
                                <div class="pin-handles"></div>
                                <div class="track-bg"></div>
                                <div class="track-fill"></div>
                                <input type="range" class="input-l ramp-single" min="0" max="100" step="0.1">
                                <input type="range" class="ramp-min ramp-handle" min="0" max="100" step="0.1">
                                <input type="range" class="ramp-max ramp-handle" min="0" max="100" step="0.1">
                            </div>
                        </div>
                    </div>
                </div>
            `;

            editor.querySelector('.l-interpolate-cta').addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                enterLInterp(block, pal);
            });

            editor.querySelectorAll('.pin-view-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const prop = btn.dataset.prop;
                    const withPins = !propPinViewEnabled(pal, prop);
                    if (prop === 'l') setLInterpPinView(block, pal, withPins);
                    else setHsPinView(block, pal, prop, withPins);
                });
            });

            editor.querySelectorAll('.slider-ramp-wrap').forEach(wrap => {
                const prop = wrap.dataset.prop;
                let altClick = false;
                let dragMoved = false;
                let rampDrag = null;
                let pinDrag = null;
                const hintMin = wrap.querySelector('.ramp-hint-min');
                const hintMax = wrap.querySelector('.ramp-hint-max');

                const showRampHint = (which) => {
                    if (!hintMin || !hintMax) return;
                    hintMin.classList.toggle('visible', which === 'min');
                    hintMax.classList.toggle('visible', which === 'max');
                };

                wrap.addEventListener('contextmenu', (e) => {
                    showInterpContextMenu(e, block, pal, wrap, prop);
                });

                wrap.addEventListener('pointerdown', (e) => {
                    if (e.target.closest('.l-interpolate-cta, .l-pin-mode-toggle, .pin-mode-toggle')) return;
                    if (e.button !== 0) return;
                    altClick = e.altKey;
                    dragMoved = false;
                    if (e.altKey) return;

                    if (wrap.classList.contains('slider-inactive')) return;

                    if (wrap.classList.contains('pin-ramp-mode')) {
                        pinDrag = pickPinHandle(wrap, pal, prop, e.clientX);
                        if (pinDrag < 0) return;
                        historyDragStart();
                        e.preventDefault();
                        dragMoved = true;
                        wrap.setPointerCapture(e.pointerId);
                        showPinHints(wrap, pinDrag);
                        onPinSlider(block, pal, prop, pinDrag, String(valueFromPointer(wrap, prop, e.clientX)));
                        return;
                    }

                    if (wrap.classList.contains('ramp-mode')) {
                        if (prop === 'l' && !pal.lInterp) return;
                        historyDragStart();
                        e.preventDefault();
                        rampDrag = pickRampHandle(wrap, prop, e.clientX);
                        dragMoved = true;
                        wrap.setPointerCapture(e.pointerId);
                        onRampSlider(block, pal, prop, rampDrag, String(valueFromPointer(wrap, prop, e.clientX)));
                        return;
                    }

                    if (prop === 'l' && !wrap.classList.contains('ramp-mode')) return;

                    if (e.target.closest('input')) {
                        historyDragStart();
                        const onMove = () => { dragMoved = true; };
                        document.addEventListener('pointermove', onMove);
                        document.addEventListener('pointerup', () => {
                            document.removeEventListener('pointermove', onMove);
                        }, { once: true });
                    }
                });
                wrap.addEventListener('pointermove', (e) => {
                    if (wrap.classList.contains('pin-ramp-mode')) {
                        const hover = pinDrag !== null ? pinDrag : pickPinHandle(wrap, pal, prop, e.clientX);
                        if (hover >= 0) showPinHints(wrap, hover);
                        else hidePinHints(wrap);
                        if (pinDrag === null) return;
                        onPinSlider(block, pal, prop, pinDrag, String(valueFromPointer(wrap, prop, e.clientX)));
                        return;
                    }
                    if (!wrap.classList.contains('ramp-mode')) {
                        showRampHint(null);
                        return;
                    }
                    if (rampDrag === null) {
                        showRampHint(pickRampHandle(wrap, prop, e.clientX));
                    }
                    if (!rampDrag) return;
                    onRampSlider(block, pal, prop, rampDrag, String(valueFromPointer(wrap, prop, e.clientX)));
                });
                wrap.addEventListener('pointerleave', () => {
                    showRampHint(null);
                    hidePinHints(wrap);
                });
                wrap.addEventListener('pointerup', () => {
                    rampDrag = null;
                    pinDrag = null;
                    hidePinHints(wrap);
                });
                wrap.addEventListener('lostpointercapture', () => {
                    rampDrag = null;
                    pinDrag = null;
                    hidePinHints(wrap);
                });

                wrap.addEventListener('click', (e) => {
                    if (!altClick || dragMoved) return;
                    if ((prop === 'h' || prop === 's') && pal.selected !== null) return;
                    e.preventDefault();
                    if (prop === 'h' || prop === 's') toggleRamp(block, pal, prop);
                });

                const minIn = wrap.querySelector('.ramp-min');
                const maxIn = wrap.querySelector('.ramp-max');
                if (minIn) minIn.oninput = e => onRampSlider(block, pal, prop, 'min', e.target.value);
                if (maxIn) maxIn.oninput = e => onRampSlider(block, pal, prop, 'max', e.target.value);
            });

            editor.querySelector('.input-h').oninput = e => onSlider(block, pal, 'h', e.target.value);
            editor.querySelector('.input-s').oninput = e => onSlider(block, pal, 's', e.target.value);
            editor.querySelector('.input-l').oninput = e => onSlider(block, pal, 'l', e.target.value);
            editor.querySelectorAll('input[type="range"]').forEach(inp => {
                inp.addEventListener('pointerdown', (e) => {
                    if (e.button !== 0) return;
                    historyDragStart();
                }, { capture: true });
            });

            editor.querySelectorAll('.val-wrap[data-prop]').forEach(valWrap => {
                const prop = valWrap.dataset.prop;
                valWrap.addEventListener('click', (e) => {
                    const seg = e.target.closest('.val-segment');
                    if (!seg) return;
                    e.preventDefault();
                    e.stopPropagation();
                    if (!canEditSliderVal(block, pal, prop)) return;
                    const idx = parseInt(seg.dataset.idx, 10);
                    if (pal.valEdit?.prop === prop && pal.valEdit?.idx === idx && seg.querySelector('.val-input')) {
                        return;
                    }
                    startValEdit(block, pal, prop, idx);
                });
            });

            block.addEventListener('click', (e) => {
                if (e.target.closest('.swatch')) return;
                if (e.target.closest('.color-swatch-btn, .color-picker-overlay, .bezier-editor-popover, .interp-ctx-menu, .swatch-ctx-menu')) return;
                if (e.target.closest('.palette-editor, button, input, label')) return;
                deselectPalette(block, pal);
            });

            block.append(toolbar, main, editor);
            updateColorSpaceLabels(block);
            applyBgPreview(block, pal);
            updateSwatches(block, pal);
            syncEditor(block, pal);
            observeSliderTracks(block);
            return block;
        }

        function render() {
            closeColorPicker();
            closeInterpCtxMenu();
            closeSwatchCtxMenu();
            closeBezierEditor();
            const scrollPalettes = palettes.length > 2;
            document.body.classList.toggle('scroll-palettes', scrollPalettes);
            $('palettesContainer').replaceChildren(...palettes.map((pal, i) => buildPaletteBlock(pal, i)));
            scheduleSliderTrackRefresh();
            initHistoryUi();
        }

        palettes = [createPalette(DEFAULT_STEPS, DEFAULT_HEX, DEFAULT_BG)];
        generatePalette(palettes[0], true);
        render();
    </script>
</body>
</html>
