<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSLuv/HCT Palette</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            max-width: 100%;
            overflow-x: clip;
        }
        body {
            --accent: #4f46e5;
            --palette-fill-h: calc((100vh - 2rem - 0.75rem) / 2);
            font-family: system-ui, sans-serif;
            background: #0a0a0f;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        input[type="text"] {
            font-family: ui-monospace, monospace;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            width: 7rem;
            text-transform: uppercase;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent); }
        input[type="text"].error { border-color: #f43f5e; }
        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        button:hover { filter: brightness(1.1); }
        button.dark-mode-btn {
            background: #1a1a24;
            border: 1px solid #333;
            color: #94a3b8;
        }
        button.dark-mode-btn:hover {
            color: #fff;
            border-color: #555;
            filter: none;
        }
        button.dark-mode-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        button.dark-mode-btn.active:hover {
            filter: brightness(1.1);
        }
        button.ghost {
            background: #1a1a24;
            border: 1px solid #333;
            color: #94a3b8;
            font-size: 1.1rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            width: 2.5rem;
            height: 2.5rem;
        }
        button.ghost:hover { color: #fff; border-color: #555; filter: none; }
        button.ghost.fill-v {
            flex: 1;
            min-height: 2.5rem;
            height: auto;
            width: 2.5rem;
        }
        button.ghost.danger:hover { border-color: #f43f5e; color: #f43f5e; }
        #palettesContainer {
            flex: 1;
            min-width: 0;
            min-height: 0;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        body.scroll-palettes {
            height: auto;
            overflow-y: auto;
        }
        body.scroll-palettes #palettesContainer {
            flex: none;
            min-height: auto;
        }
        body.scroll-palettes .palette-block {
            flex: none;
            height: var(--palette-fill-h);
            min-height: var(--palette-fill-h);
        }
        body.scroll-palettes .palette-main {
            flex: 1;
            min-height: 0;
        }
        .palette-block {
            flex: 1;
            min-width: 0;
            min-height: 0;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 0.75rem;
            border-radius: 10px;
            border: 1px solid #1a1a24;
            background: #0d0d12;
            overflow-x: clip;
        }
        .palette-toolbar {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            flex-shrink: 0;
            flex-wrap: wrap;
            width: 100%;
        }
        .toolbar-spacer {
            flex: 1;
            min-width: 0;
        }
        .history-controls {
            flex-shrink: 0;
        }
        .history-controls-btns {
            display: flex;
            gap: 0.35rem;
        }
        .history-controls-btns button {
            min-width: 2.5rem;
            padding: 0.4rem 0.75rem;
            font-size: 0.85rem;
            line-height: 1.2;
            background: #1a1a24;
            border: 1px solid #333;
            color: #94a3b8;
        }
        .history-controls-btns button:hover:not(:disabled) {
            color: #fff;
            border-color: #555;
            filter: none;
        }
        .history-controls-btns button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .color-space-field .color-space-toggle-btns {
            display: flex;
            border: 1px solid #333;
            border-radius: 6px;
            overflow: hidden;
        }
        .color-space-toggle-btns {
            display: flex;
            border: 1px solid #333;
            border-radius: 6px;
            overflow: hidden;
        }
        .palette-toolbar .color-space-toggle-btns button {
            padding: 0.4rem 0.75rem;
            font-size: 0.85rem;
            line-height: 1.2;
            border-radius: 0;
            border: none;
            background: #1a1a24;
            color: #94a3b8;
        }
        .palette-toolbar .color-space-toggle-btns button:hover {
            filter: none;
            color: #e2e8f0;
        }
        .palette-toolbar .color-space-toggle-btns button.active {
            background: var(--accent);
            color: #fff;
        }
        .toolbar-field {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .dm-gain-field {
            min-width: 9.5rem;
            max-width: 12rem;
            flex: 1 1 9.5rem;
        }
        .dm-gain-field.dm-gain-hidden,
        .dm-contrast-metric-field.dm-gain-hidden {
            display: none !important;
        }
        .dm-contrast-metric-field {
            flex: 0 0 auto;
        }
        .dm-contrast-metric-field .color-space-toggle-btns button {
            min-width: 2.85rem;
        }
        .dm-gain-field .slider-ramp-wrap {
            width: 100%;
        }
        .interp-ctx-menu,
        .swatch-ctx-menu,
        .interp-ctx-menu {
            position: fixed;
            z-index: 2100;
            min-width: 10rem;
            padding: 0.25rem 0;
            background: #151520;
            border: 1px solid #333;
            border-radius: 6px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
        }
        .interp-ctx-menu button,
        .swatch-ctx-menu button,
        .gain-ctx-menu button {
            display: block;
            width: 100%;
            padding: 0.4rem 0.65rem;
            border: none;
            border-radius: 0;
            background: transparent;
            color: #e2e8f0;
            font-size: 0.75rem;
            text-align: left;
            cursor: pointer;
        }
        .interp-ctx-menu button:hover,
        .swatch-ctx-menu button:hover,
        .gain-ctx-menu button:hover {
            background: #1e293b;
            filter: none;
        }
        .bezier-editor-popover {
            position: fixed;
            z-index: 2200;
            width: min(100vw - 1rem, 16.5rem);
            padding: 0.65rem;
            background: #12121a;
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 32px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.72rem;
            color: #94a3b8;
        }
        .bezier-editor-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.35rem;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }
        .bezier-editor-head.is-dragging {
            cursor: grabbing;
        }
        .bezier-editor-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #e2e8f0;
        }
        .bezier-editor-close {
            padding: 0.15rem 0.4rem;
            font-size: 1rem;
            line-height: 1;
            background: transparent;
            border: none;
            color: #64748b;
            cursor: pointer;
        }
        .bezier-editor-close:hover {
            color: #e2e8f0;
            filter: none;
        }
        .bezier-graph-wrap {
            position: relative;
            border: 1px solid #333;
            border-radius: 6px;
            background: #0d0d12;
            touch-action: none;
        }
        .bezier-graph {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1;
        }
        .bezier-graph .bezier-handle {
            cursor: grab;
            fill: var(--accent);
            stroke: #fff;
            stroke-width: 2;
        }
        .bezier-graph .bezier-handle:active {
            cursor: grabbing;
        }
        .bezier-css-row input[type="text"] {
            width: 100%;
            text-transform: none;
            font-size: 0.7rem;
        }
        .bezier-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .bezier-presets button {
            padding: 0.28rem 0.45rem;
            font-size: 0.68rem;
            background: #1a1a24;
            border: 1px solid #333;
            color: #cbd5e1;
        }
        .bezier-presets button:hover {
            border-color: #555;
            color: #fff;
            filter: none;
        }
        .bezier-presets button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .input-with-swatch {
            position: relative;
            display: inline-flex;
            width: 7rem;
        }
        .input-with-swatch input[type="text"] {
            width: 100%;
            padding-right: calc(0.4rem * 2 + 1.15rem);
        }
        .input-with-swatch.has-extra input[type="text"] {
            padding-right: calc(1.65rem + 0.4rem * 2 + 1.15rem);
        }
        .color-swatch-btn {
            position: absolute;
            top: 0.4rem;
            right: 0.4rem;
            bottom: 0.4rem;
            width: auto;
            aspect-ratio: 1;
            height: auto;
            padding: 0;
            border: 1px solid #555;
            border-radius: 3px;
            cursor: pointer;
            background: #2a2a36;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.25);
        }
        .input-with-swatch.has-extra .color-swatch-btn {
            right: calc(1.65rem + 0.4rem);
        }
        .color-swatch-btn:hover {
            border-color: #94a3b8;
        }
        .color-picker-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
        }
        .color-picker {
            position: fixed;
            z-index: 2001;
            width: 15.5rem;
            padding: 0.65rem;
            background: #12121a;
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.72rem;
            color: #94a3b8;
        }
        .color-picker-sv-wrap {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .color-picker-sv {
            display: block;
            width: 100%;
            height: 9rem;
            cursor: crosshair;
        }
        .color-picker-sv-cursor {
            position: absolute;
            left: 0;
            top: 0;
            width: 12px;
            height: 12px;
            margin: 0;
            border: 2px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.55);
            pointer-events: none;
            transform: translate(-50%, -50%);
        }
        .color-picker-sliders {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .color-picker-preview {
            flex: 0 0 2.25rem;
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 6px;
            border: 1px solid #333;
        }
        .color-picker-hue-wrap {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
        }
        .color-picker-hue {
            width: 100%;
            height: 14px;
            margin: 0;
            border-radius: 7px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(to right,
                #f00 0%, #ff0 17%, #0f0 33%, #0ff 50%, #00f 67%, #f0f 83%, #f00 100%);
            cursor: pointer;
        }
        .color-picker-hue::-webkit-slider-runnable-track {
            height: 14px;
            border-radius: 7px;
            background: transparent;
        }
        .color-picker-hue::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            margin-top: 0;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45);
            cursor: pointer;
        }
        .color-picker-hue::-moz-range-track {
            height: 14px;
            border-radius: 7px;
            background: linear-gradient(to right,
                #f00 0%, #ff0 17%, #0f0 33%, #0ff 50%, #00f 67%, #f0f 83%, #f00 100%);
        }
        .color-picker-hue::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border: none;
            border-radius: 50%;
            box-shadow: 0 0 0 2px #fff, 0 0 0 3px rgba(0, 0, 0, 0.45);
            cursor: pointer;
        }
        .color-picker-row {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        .color-picker-row > span {
            flex: 0 0 2rem;
            font-size: 0.68rem;
        }
        .color-picker-row input[type="text"] {
            flex: 1;
            min-width: 0;
            width: auto;
            text-transform: none;
            font-size: 0.72rem;
            padding: 0.3rem 0.45rem;
        }
        .color-picker-rgb {
            display: flex;
            gap: 0.25rem;
            flex: 1;
            min-width: 0;
        }
        .color-picker-rgb input[type="text"] {
            flex: 1;
            min-width: 0;
            text-align: center;
        }
        .input-with-eye {
            position: relative;
            display: inline-flex;
            width: 7rem;
        }
        .input-with-eye input[type="text"] {
            width: 100%;
            padding-right: 1.65rem;
        }
        .bg-eye {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 1.65rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: #64748b;
            cursor: pointer;
            border-radius: 0 6px 6px 0;
        }
        .bg-eye:hover { color: #e2e8f0; }
        .bg-eye.active { color: var(--accent); }
        .bg-eye svg {
            width: 1rem;
            height: 1rem;
            display: block;
        }
        .palette-main {
            --palette-radius: 12px;
            --swatch-radius: 6px;
            --palette-pad: 6px;
            flex: 1;
            min-width: 0;
            min-height: 0;
            max-width: 100%;
            display: flex;
            align-items: stretch;
            gap: 0.5rem;
            overflow-x: clip;
        }
        .palette-preview {
            flex: 1;
            min-width: 0;
            min-height: 0;
            max-width: 100%;
            border-radius: var(--palette-radius);
            padding: var(--palette-pad);
            display: flex;
            transition: background-color 0.15s;
            overflow-x: clip;
        }
        .palette-preview .palette-row {
            flex: 1;
            min-width: 0;
            min-height: 0;
        }
        .swatch-hex-center {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .swatch-hex-row {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            width: 100%;
            max-width: 100%;
        }
        .swatch-hex-row.hex-stacked {
            flex-direction: column;
            gap: var(--swatch-label-icon-gap);
        }
        .swatch-hex-row.hex-stacked .hex {
            width: 100%;
            max-width: 100%;
        }
        .swatch .hex {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            line-height: 1.2;
            cursor: pointer;
            opacity: 0.9;
            text-align: center;
            font-family: ui-monospace, monospace;
            min-width: 0;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .swatch-hex-row:not(.hex-stacked) .hex {
            max-width: calc(100% - 24px - 0.4rem);
        }
        .swatch .hex:hover { opacity: 1; }
        .swatch .hex-input {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            font-family: ui-monospace, monospace;
            width: 4.5rem;
            padding: 0.1rem 0.2rem;
            border: 1px solid var(--accent);
            border-radius: 3px;
            background: rgba(0, 0, 0, 0.35);
            color: inherit;
            text-align: center;
            text-transform: uppercase;
            outline: none;
        }
        .swatch.light .hex-input { background: rgba(255, 255, 255, 0.65); }
        .swatch .hex-input.error { border-color: #f43f5e; }
        .swatch-hex-edit {
            padding: 0;
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            border-radius: 3px;
            opacity: 0.85;
        }
        .swatch-hex-edit:hover:not(:disabled) { opacity: 1; }
        .swatch-hex-edit:disabled {
            opacity: 0.28;
            cursor: not-allowed;
        }
        .swatch-hex-edit svg {
            width: 16px;
            height: 16px;
            display: block;
        }
        .swatch-contrasts {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            flex-shrink: 0;
            width: 100%;
            text-align: center;
        }
        .swatch-contrast-slot {
            --contrast-row-h: calc(0.72rem * 1.2);
            min-height: var(--contrast-row-h);
            height: var(--contrast-row-h);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .swatch .contrast-line {
            font-size: 0.72rem;
            opacity: 0.85;
            letter-spacing: 0.02em;
            line-height: 1.2;
        }
        .swatch .contrast-line.contrast-editable {
            cursor: text;
        }
        .swatch .contrast-line.contrast-editable:hover {
            opacity: 1;
        }
        .swatch .contrast-input {
            box-sizing: border-box;
            width: 4.75rem;
            max-width: 100%;
            height: var(--contrast-row-h);
            margin: 0;
            padding: 0 0.15rem;
            font-size: 0.72rem;
            line-height: 1.2;
            font-family: inherit;
            letter-spacing: 0.02em;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.35);
            color: inherit;
            outline: none;
        }
        .swatch.light .contrast-input {
            background: rgba(255, 255, 255, 0.65);
            border-color: rgba(0, 0, 0, 0.2);
            color: #0f172a;
        }
        .swatch .contrast-input.error {
            border-color: #f43f5e;
        }
        .palette-row {
            display: flex;
            flex: 1;
            gap: var(--palette-pad, 6px);
            min-width: 0;
            min-height: 0;
            align-items: stretch;
        }
        .swatch {
            --swatch-label-icon-gap: 0.15rem;
            flex: 1;
            min-width: 0;
            min-height: 0;
            border-radius: var(--swatch-radius, 6px);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5rem 0.25rem;
            font-family: ui-monospace, monospace;
        }
        .swatch.light { color: #0a0a0f; }
        .swatch.dark { color: #f8fafc; }
        .swatch.selected { outline: 2px solid var(--accent); outline-offset: 2px; z-index: 1; }
        .steps-ctrl {
            display: flex;
            flex-direction: column;
            gap: var(--palette-pad, 6px);
            width: 2.5rem;
            align-items: stretch;
            flex-shrink: 0;
            align-self: stretch;
            min-height: 0;
        }
        .steps-grow {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: var(--palette-pad, 6px);
            width: 100%;
        }
        .steps-grow .ghost.fill-v {
            flex: 1;
            min-height: 0;
            width: 100%;
            border-radius: var(--palette-radius, 12px);
        }
        .steps-ctrl > .ghost {
            flex-shrink: 0;
            width: 100%;
            border-radius: var(--palette-radius, 12px);
        }
        .step-count {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            font-family: ui-monospace, monospace;
            font-size: 0.8rem;
            font-weight: 600;
            line-height: 1;
            text-align: center;
        }
        .palette-editor {
            flex-shrink: 0;
            min-width: 0;
            max-width: 100%;
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-x: clip;
        }
        .swatch-head {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--swatch-label-icon-gap);
            flex-shrink: 0;
        }
        .swatch-name {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            line-height: 1.2;
            opacity: 0.9;
        }
        .swatch-pin {
            padding: 0;
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            border-radius: 3px;
            opacity: 0.85;
        }
        .swatch-pin:hover { opacity: 1; }
        .swatch-pin.active {
            color: #fff;
            background: var(--accent);
            opacity: 1;
        }
        .swatch-pin svg {
            width: 16px;
            height: 16px;
            display: block;
        }
        .swatch-above,
        .swatch-below {
            flex: 1;
            min-height: 0;
            width: 100%;
        }
        .swatch-above {
            display: flex;
            align-items: center;

<body>

    <div id="palettesContainer"></div>

    <script type="module">
        import { Hsluv } from 'https://esm.sh/hsluv@1.0.1';
        import { Hct } from 'https://esm.sh/@material/material-color-utilities@0.3.0';
        import { sRGBtoY } from 'https://esm.sh/apca-w3@0.1.9';

        const COLOR_SPACE = 'srgb';
        const L_START = 95;
        const L_END = 5;
        const AXIS_LABELS = {
            hsluv: { h: 'Hue', s: 'Saturation', l: 'Lightness' },
            hct: { h: 'Hue', s: 'Chroma', l: 'Tone' }
        };
        let colorSpace = 'hsluv';
        const conv = new Hsluv();

        function stepScaleName(index) {
            return String(50 * (index + 1));
        }

        function sanitizeHexInput(raw) {
            return String(raw ?? '').replace(/#/g, '').replace(/[^0-9a-fA-F]/g, '').slice(0, 6);
        }

        function normalizeHex(hex) {
            const h = sanitizeHexInput(hex);
            if (h.length !== 6) return null;
            return '#' + h.toUpperCase();
        }

        function toolbarHexDisplay(hex) {
            const norm = normalizeHex(hex);
            return norm ? norm.slice(1) : sanitizeHexInput(hex);
        }

        function hexToArgb(hex) {
            const norm = normalizeHex(hex);
            if (!norm) return null;
            return (0xff << 24) | parseInt(norm.slice(1), 16);
        }

        function argbToHex(argb) {
            return '#' + (argb & 0xffffff).toString(16).padStart(6, '0').toUpperCase();
        }

        function hexToHsluv(hex) {
            const norm = normalizeHex(hex);
            if (!norm) return null;
            conv.hex = norm;
            conv.hexToHsluv();
            if ([conv.hsluv_h, conv.hsluv_s, conv.hsluv_l].some(Number.isNaN)) return null;
            return { h: conv.hsluv_h, s: conv.hsluv_s, l: conv.hsluv_l };
        }

        function hsluvToHex(h, s, l) {
            conv.hsluv_h = ((h % 360) + 360) % 360;
            conv.hsluv_s = Math.max(0, Math.min(100, s));
            conv.hsluv_l = Math.max(0, Math.min(100, l));
            conv.hsluvToHex();
            return conv.hex ? conv.hex.toUpperCase() : null;
        }

        function hexToHct(hex) {
            const argb = hexToArgb(hex);
            if (argb == null) return null;
            try {
                const hct = Hct.fromInt(argb);
                return {
                    h: hct.hue,
                    s: Math.max(0, Math.min(100, hct.chroma)),
                    l: Math.max(0, Math.min(100, hct.tone))
                };
            } catch { return null; }
        }

        function hctToHex(h, s, l) {
            try {
                const hue = ((h % 360) + 360) % 360;
                const chroma = Math.max(0, Math.min(100, s));
                const tone = Math.max(0, Math.min(100, l));
                return argbToHex(Hct.from(hue, chroma, tone).toInt());
            } catch { return null; }
        }

        function hexToModel(hex) {
            return colorSpace === 'hct' ? hexToHct(hex) : hexToHsluv(hex);
        }

        function modelToHex(h, s, l) {
            return colorSpace === 'hct' ? hctToHex(h, s, l) : hsluvToHex(h, s, l);
        }

        function maxHctChroma(hue, tone) {
            try {
                const h = ((hue % 360) + 360) % 360;
                const t = Math.max(0, Math.min(100, tone));
                return Math.round(Hct.from(h, 200, t).chroma * 10) / 10;
            } catch {
                return 100;
            }
        }

        function clampHctChromaForStep(h, s, l) {
            const clamped = clampSliderVal('s', s);
            if (colorSpace !== 'hct') return clamped;
            return Math.min(clamped, maxHctChroma(h, l));
        }

        function useHctChromaCap(pal, wrap) {
            return colorSpace === 'hct'
                && pal.selected !== null
                && wrap?.dataset.prop === 's'
                && !wrap.classList.contains('ramp-mode')
                && !wrap.classList.contains('pin-ramp-mode');
        }

        function syncStepHctChroma(step) {
            if (colorSpace !== 'hct' || !step) return;
            const capped = clampHctChromaForStep(step.h, step.s, step.l);
            if (capped !== step.s) step.s = capped;
        }

        function updateColorSpaceLabels(block) {
            const labels = AXIS_LABELS[colorSpace];
            const editor = block.querySelector('.palette-editor');
            if (!editor) return;
            editor.querySelector('.slider-axis-h').textContent = labels.h;
            editor.querySelector('.slider-axis-s').textContent = labels.s;
            editor.querySelector('.slider-axis-l').textContent = labels.l;
        }

        function setColorSpace(next) {
            if (next !== 'hsluv' && next !== 'hct') return;
            if (colorSpace === next) return;
            pushHistory();
            colorSpace = next;
            palettes.forEach(pal => refreshStepHex(pal));
            render();
            afterPrimaryPaletteChange();
        }

        function buildHistoryControls() {
            const field = document.createElement('div');
            field.className = 'toolbar-field history-controls';
            field.append('Historie');
            const btns = document.createElement('div');
            btns.className = 'history-controls-btns';
            const undoBtn = document.createElement('button');
            undoBtn.type = 'button';
            undoBtn.id = 'historyUndoBtn';
            undoBtn.title = 'Zpět (Ctrl+Z)';
            undoBtn.setAttribute('aria-label', 'Zpět');
            undoBtn.disabled = true;
            undoBtn.textContent = '←';
            const redoBtn = document.createElement('button');
            redoBtn.type = 'button';
            redoBtn.id = 'historyRedoBtn';
            redoBtn.title = 'Vpřed (Ctrl+Y)';
            redoBtn.setAttribute('aria-label', 'Vpřed');
            redoBtn.disabled = true;
            redoBtn.textContent = '→';
            btns.append(undoBtn, redoBtn);
            field.appendChild(btns);
            return field;
        }

        function buildColorSpaceField() {
            const field = document.createElement('div');
            field.className = 'toolbar-field color-space-field';
            field.append('Prostor');
            const btns = document.createElement('div');
            btns.className = 'color-space-toggle-btns';
            [['hsluv', 'HSLuv'], ['hct', 'HCT']].forEach(([id, text]) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = text;
                btn.classList.toggle('active', colorSpace === id);
                btn.onclick = () => setColorSpace(id);
                btns.appendChild(btn);
            });
            field.appendChild(btns);
            return field;
        }

        function hexToRgb(hex) {
            const norm = normalizeHex(hex);
            if (!norm) return null;
            const h = norm.slice(1);
            return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
        }

        function rgbToHex(r, g, b) {
            const c = v => Math.max(0, Math.min(255, Math.round(Number(v))));
            const rr = c(r), gg = c(g), bb = c(b);
            return '#' + [rr, gg, bb].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
        }

        function updateToolbarSwatch(btn, hex) {
            const norm = normalizeHex(hex);
            btn.style.background = norm && hexToRgb(norm) ? norm : '#2a2a36';
        }

        function rgbToHsv(r, g, b) {
            const rn = r / 255;
            const gn = g / 255;
            const bn = b / 255;
            const max = Math.max(rn, gn, bn);
            const min = Math.min(rn, gn, bn);
            const d = max - min;
            let h = 0;
            const s = max === 0 ? 0 : (d / max) * 100;
            const v = max * 100;
            if (d > 0) {
                if (max === rn) h = ((gn - bn) / d + (gn < bn ? 6 : 0)) * 60;
                else if (max === gn) h = ((bn - rn) / d + 2) * 60;
                else h = ((rn - gn) / d + 4) * 60;
            }
            return { h, s, v };
        }

        function hsvToRgb(h, s, v) {
            const hue = ((h % 360) + 360) % 360;
            const sat = Math.max(0, Math.min(100, s)) / 100;
            const val = Math.max(0, Math.min(100, v)) / 100;
            const c = val * sat;
            const x = c * (1 - Math.abs((hue / 60) % 2 - 1));
            const m = val - c;
            let rp = 0;
            let gp = 0;
            let bp = 0;
            if (hue < 60) { rp = c; gp = x; }
            else if (hue < 120) { rp = x; gp = c; }
            else if (hue < 180) { gp = c; bp = x; }
            else if (hue < 240) { gp = x; bp = c; }
            else if (hue < 300) { rp = x; bp = c; }
            else { rp = c; bp = x; }
            return [
                Math.round((rp + m) * 255),
                Math.round((gp + m) * 255),
                Math.round((bp + m) * 255)
            ];
        }

        function hexToHsv(hex) {
            const rgb = hexToRgb(hex);
            if (!rgb) return null;
            return rgbToHsv(rgb[0], rgb[1], rgb[2]);
        }

        function hsvToHex(h, s, v) {
            const [r, g, b] = hsvToRgb(h, s, v);
            return rgbToHex(r, g, b);
        }

        let colorPickerOpen = null;

        function closeColorPicker() {
            if (!colorPickerOpen) return;
            const onCommit = colorPickerOpen.onCommit;
            document.removeEventListener('keydown', colorPickerOpen.onKey);
            colorPickerOpen.overlay.remove();
            colorPickerOpen = null;
            onCommit?.();
        }

        function positionColorPicker(panel, anchor) {
            const rect = anchor.getBoundingClientRect();
            const margin = 6;
            let top = rect.bottom + margin;
            let left = rect.left;
            panel.style.visibility = 'hidden';
            panel.style.top = '0';
            panel.style.left = '0';
            const pw = panel.offsetWidth;
            const ph = panel.offsetHeight;
            if (left + pw > window.innerWidth - margin) {
                left = Math.max(margin, window.innerWidth - pw - margin);
            }
            if (top + ph > window.innerHeight - margin) {
                top = Math.max(margin, rect.top - ph - margin);
            }
            panel.style.left = left + 'px';
            panel.style.top = top + 'px';
            panel.style.visibility = '';
        }

        function openColorPicker(anchor, getHex, onLive, onCommit) {
            closeColorPicker();

            const startHex = normalizeHex(getHex()) || '#808080';
            let hsv = hexToHsv(startHex) || { h: 0, s: 0, v: 50 };
            let draftHex = startHex;

            const overlay = document.createElement('div');
            overlay.className = 'color-picker-overlay';
            const panel = document.createElement('div');
            panel.className = 'color-picker';
            panel.setAttribute('role', 'dialog');
            panel.setAttribute('aria-label', 'Výběr barvy');

            const svWrap = document.createElement('div');
            svWrap.className = 'color-picker-sv-wrap';
            const svCanvas = document.createElement('canvas');
            svCanvas.className = 'color-picker-sv';
            svCanvas.width = 220;
            svCanvas.height = 144;
            const svCursor = document.createElement('div');
            svCursor.className = 'color-picker-sv-cursor';
            svWrap.append(svCanvas, svCursor);

            const sliderRow = document.createElement('div');
            sliderRow.className = 'color-picker-sliders';
            const preview = document.createElement('div');
            preview.className = 'color-picker-preview';
            const hueWrap = document.createElement('div');
            hueWrap.className = 'color-picker-hue-wrap';
            const hueRange = document.createElement('input');
            hueRange.type = 'range';
            hueRange.className = 'color-picker-hue';
            hueRange.min = '0';
            hueRange.max = '360';
            hueRange.step = '1';
            hueRange.value = String(Math.round(hsv.h));
            hueWrap.appendChild(hueRange);
            sliderRow.append(preview, hueWrap);

            const hexRow = document.createElement('div');
            hexRow.className = 'color-picker-row';
            const hexIn = document.createElement('input');
            hexIn.type = 'text';
            hexIn.spellcheck = false;
            hexIn.autocomplete = 'off';
            hexIn.value = draftHex;
            const hexLbl = document.createElement('span');
            hexLbl.textContent = 'HEX';
            hexRow.append(hexLbl, hexIn);

            const rgbRow = document.createElement('div');
            rgbRow.className = 'color-picker-row';
            const rgbLbl = document.createElement('span');
            rgbLbl.textContent = 'RGB';
            const rgbWrap = document.createElement('div');
            rgbWrap.className = 'color-picker-rgb';
            const rgbInputs = ['R', 'G', 'B'].map(label => {
                const inp = document.createElement('input');
                inp.type = 'text';
                inp.inputMode = 'numeric';
                inp.placeholder = label;
                inp.title = label;
                return inp;
            });
            rgbRow.append(rgbLbl, rgbWrap);
            rgbInputs.forEach(inp => rgbWrap.appendChild(inp));

            panel.append(svWrap, sliderRow, hexRow, rgbRow);
            overlay.appendChild(panel);
            document.body.appendChild(overlay);

            const svCtx = svCanvas.getContext('2d');

            const syncFromHsv = () => {
                draftHex = hsvToHex(hsv.h, hsv.s, hsv.v) || draftHex;
                const norm = normalizeHex(draftHex);
                if (norm) draftHex = norm;
                preview.style.background = draftHex;
                hueRange.style.accentColor = hsvToHex(hsv.h, 100, 100) || draftHex;
                hexIn.value = draftHex;
                const rgb = hexToRgb(draftHex) || [128, 128, 128];
                rgbInputs[0].value = String(rgb[0]);
                rgbInputs[1].value = String(rgb[1]);
                rgbInputs[2].value = String(rgb[2]);
                hueRange.value = String(Math.round(hsv.h));
                updateSvCursor();
                onLive(draftHex);
            };

            const syncFromHex = () => {
                const norm = normalizeHex(hexIn.value.trim());
                if (!norm) return false;
                const next = hexToHsv(norm);
                if (!next) return false;
                hsv = next;
                draftHex = norm;
                syncFromHsv();
                drawSv();
                return true;
            };

            const syncFromRgb = () => {
                const hex = rgbToHex(rgbInputs[0].value, rgbInputs[1].value, rgbInputs[2].value);
                if (!normalizeHex(hex)) return false;
                hexIn.value = hex;
                return syncFromHex();
            };

            function updateSvCursor() {
                svCursor.style.left = hsv.s + '%';
                svCursor.style.top = (100 - hsv.v) + '%';
            }

            function drawSv() {
                const w = svCanvas.width;
                const h = svCanvas.height;
                const img = svCtx.createImageData(w, h);
                for (let y = 0; y < h; y++) {
                    const v = (1 - y / (h - 1 || 1)) * 100;
                    for (let x = 0; x < w; x++) {
                        const s = (x / (w - 1 || 1)) * 100;
                        const [r, g, b] = hsvToRgb(hsv.h, s, v);
                        const i = (y * w + x) * 4;
                        img.data[i] = r;
                        img.data[i + 1] = g;
                        img.data[i + 2] = b;
                        img.data[i + 3] = 255;
                    }
                }
                svCtx.putImageData(img, 0, 0);
                updateSvCursor();
            }

            function pickFromSv(clientX, clientY) {
                const rect = svCanvas.getBoundingClientRect();
                const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
                const y = Math.max(0, Math.min(rect.height, clientY - rect.top));
                hsv.s = (x / (rect.width || 1)) * 100;
                hsv.v = (1 - y / (rect.height || 1)) * 100;
                syncFromHsv();
            }

            let svDragging = false;
            svCanvas.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                svDragging = true;
                svCanvas.setPointerCapture(e.pointerId);
                pickFromSv(e.clientX, e.clientY);
            });
            svCanvas.addEventListener('pointermove', (e) => {
                if (!svDragging) return;
                pickFromSv(e.clientX, e.clientY);
            });
            svCanvas.addEventListener('pointerup', () => { svDragging = false; });
            svCanvas.addEventListener('lostpointercapture', () => { svDragging = false; });

            hueRange.oninput = () => {
                hsv.h = parseFloat(hueRange.value);
                drawSv();
                syncFromHsv();
            };

            hexIn.oninput = () => {
                const cleaned = sanitizeHexInput(hexIn.value);
                if (hexIn.value !== cleaned) hexIn.value = cleaned;
                if (cleaned.length === 6) {
                    syncFromHex();
                } else {
                    preview.style.background = normalizeHex(cleaned) || preview.style.background;
                }
            };
            hexIn.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    if (!syncFromHex()) hexIn.classList.add('error');
                    else hexIn.classList.remove('error');
                }
            };
            hexIn.onblur = () => {
                if (!syncFromHex()) syncFromHsv();
                hexIn.classList.remove('error');
            };

            rgbInputs.forEach(inp => {
                inp.oninput = () => syncFromRgb();
                inp.onkeydown = (e) => {
                    if (e.key === 'Enter') syncFromRgb();
                };
            });

            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) closeColorPicker();
            });
            panel.addEventListener('click', (e) => e.stopPropagation());
            const onKey = (e) => {
                if (e.key === 'Escape') closeColorPicker();
            };
            document.addEventListener('keydown', onKey);

            colorPickerOpen = { overlay, panel, onKey, onCommit };

            drawSv();
            syncFromHsv();
            positionColorPicker(panel, anchor);
            requestAnimationFrame(() => positionColorPicker(panel, anchor));
        }

        function wireToolbarHexInput(input, onValidHex) {
            input.addEventListener('input', () => {
                const cleaned = sanitizeHexInput(input.value);
                if (input.value !== cleaned) input.value = cleaned;
                const norm = normalizeHex(cleaned);
                if (norm) onValidHex(norm);
            });
            input.addEventListener('blur', () => {
                const norm = normalizeHex(input.value);
                if (norm) input.value = norm.slice(1);
            });
        }

        function attachToolbarColorSwatch(input, onLive, onCommit) {
            const wrap = input.parentElement;
            const swatch = document.createElement('button');
            swatch.type = 'button';
            swatch.className = 'color-swatch-btn';
            swatch.title = 'Vybrat barvu';
            updateToolbarSwatch(swatch, input.value);
            swatch.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                openColorPicker(
                    swatch,
                    () => normalizeHex(input.value) || '#808080',
                    (hex) => {
                        input.value = hex.slice(1);
                        updateToolbarSwatch(swatch, hex);
                        onLive(hex);
                    },
                    onCommit
                );
            });
            input.addEventListener('input', () => updateToolbarSwatch(swatch, input.value));
            wrap.appendChild(swatch);
        }

        function relativeLuminance(hex) {
            const rgb = hexToRgb(hex);
            if (!rgb) return null;
            const lin = c => {
                c /= 255;
                return c <= 0.03928 ? c / 12.92 : ((c + 0.055) / 1.055) ** 2.4;
            };
            return 0.2126 * lin(rgb[0]) + 0.7152 * lin(rgb[1]) + 0.0722 * lin(rgb[2]);
        }

        function isLightHex(hex) {
            const y = relativeLuminance(hex);
            return y == null ? true : y > 0.55;
        }

        const APCA_W3 = {
            blkThrs: 0.022,
            blkClmp: 1.414,
            scaleBoW: 1.14,
            loBoWoffset: 0.027,
            scaleWoB: 1.14,
            loWoBoffset: 0.027,
            normBG: 0.56,
            normTXT: 0.57,
            revTXT: 0.62,
            revBG: 0.65,
            loClip: 0.1,
            deltaYmin: 0.0005
        };

        function apcaYFromHex(hex) {
            const rgb = hexToRgb(hex);
            if (!rgb) return null;
            return sRGBtoY([rgb[0], rgb[1], rgb[2], 1.0]);
        }

        function apcaSoftClampY(y) {
            if (y >= APCA_W3.blkThrs) return y;
            return Math.pow(APCA_W3.blkThrs - y, APCA_W3.blkClmp) + y;
        }

        function apcaLcUnclamped(txtY, bgY) {
            const t = apcaSoftClampY(txtY);
            const b = apcaSoftClampY(bgY);
            if (Math.abs(b - t) < 1e-9) return 0;
            let c;
            if (b > t) {
                c = (Math.pow(b, APCA_W3.normBG) - Math.pow(t, APCA_W3.normTXT)) * APCA_W3.scaleBoW;
                c = (c - APCA_W3.loBoWoffset) * 100;
            } else {
                c = (Math.pow(b, APCA_W3.revBG) - Math.pow(t, APCA_W3.revTXT)) * APCA_W3.scaleWoB;
                c = (c + APCA_W3.loWoBoffset) * 100;
            }
            return c;
        }

        /** W3 APCA bez loClip/deltaYmin – plný rozsah pro ladění palety. */
        function getApcaContrast(fgHex, bgHex) {
            const txtY = apcaYFromHex(fgHex);
            const bgY = apcaYFromHex(bgHex);
            if (txtY == null || bgY == null) return null;
            const lc = apcaLcUnclamped(txtY, bgY);
            return Number.isNaN(lc) ? null : lc;
        }

        function formatApcaValue(value) {
            return value === null ? '—' : `APCA ${value.toFixed(2)}`;
        }

        function calcWcagRatio(fgHex, bgHex) {
            const fg = hexToRgb(fgHex), bg = hexToRgb(bgHex);
            if (!fg || !bg) return null;
            const lin = c => {
                c /= 255;
                return c <= 0.03928 ? c / 12.92 : ((c + 0.055) / 1.055) ** 2.4;
            };
            const l1 = 0.2126 * lin(fg[0]) + 0.7152 * lin(fg[1]) + 0.0722 * lin(fg[2]);
            const l2 = 0.2126 * lin(bg[0]) + 0.7152 * lin(bg[1]) + 0.0722 * lin(bg[2]);
            const lighter = Math.max(l1, l2);
            const darker = Math.min(l1, l2);
            return (lighter + 0.05) / (darker + 0.05);
        }

        function solveLForWcag(h, s, targetRatio, bgHex, hintL) {
            if (targetRatio == null || !hexToRgb(bgHex)) return hintL;
            let bestL = hintL;
            let bestErr = Infinity;
            for (let i = 0; i <= 1000; i++) {
                const l = Math.round(i) / 10;
                const hex = modelToHex(h, s, l);
                if (!hex) continue;
                const r = calcWcagRatio(hex, bgHex);
                if (r == null) continue;
                const err = Math.abs(r - targetRatio);
                if (err < bestErr) {
                    bestErr = err;
                    bestL = l;
                }
            }
            return Math.round(Math.max(0, Math.min(100, bestL)) * 10) / 10;
        }

        function solveLForApca(h, s, targetLc, bgHex, hintL) {
            if (targetLc == null || !hexToRgb(bgHex)) return hintL;
            let bestL = hintL;
            let bestErr = Infinity;
            for (let i = 0; i <= 1000; i++) {
                const l = Math.round(i) / 10;
                let ch = s;
                if (colorSpace === 'hct') {
                    ch = clampHctChromaForStep(h, s, l);
                }
                const hex = modelToHex(h, ch, l);
                if (!hex) continue;
                const lc = getApcaContrast(hex, bgHex);
                if (lc == null) continue;
                const err = Math.abs(lc - targetLc);
                if (err < bestErr) {
                    bestErr = err;
                    bestL = l;
                }
            }
            return Math.round(Math.max(0, Math.min(100, bestL)) * 10) / 10;
        }

        function parseContrastTarget(kind, raw) {
            const s = String(raw).trim();
            if (kind === 'wcag') {
                const n = parseFloat(s.replace(/wcag/gi, '').replace(/:1/gi, '').trim());
                return Number.isNaN(n) || n < 1 ? null : n;
            }
            const n = parseFloat(s.replace(/apca/gi, '').trim());
            return Number.isNaN(n) ? null : n;
        }

        function cancelContrastEdit(pal) {
            pal.contrastEditIndex = null;
            pal.contrastEditKind = null;
        }

        function applyStepContrastTarget(block, pal, index, kind, target) {
            const step = pal.steps[index];
            if (!step || !canEditStepHex(pal, step) || !hexToRgb(pal.bgHex)) return false;
            pushHistory();
            setSelection(pal, index);
            const newL = kind === 'wcag'
                ? solveLForWcag(step.h, step.s, target, pal.bgHex, step.l)
                : solveLForApca(step.h, step.s, target, pal.bgHex, step.l);
            if (pal.darkMode) {
                commitDarkModeBaseL(pal, index, newL);
                const targets = kind === 'apca' ? pal.darkModeApcaTargets : pal.darkModeWcagTargets;
                if (targets) targets[index] = target;
            } else {
                step.l = newL;
                syncStepHctChroma(step);
                step.hex = modelToHex(step.h, step.s, step.l) ?? step.hex;
            }
            if (!isAnchorMode(pal)) {
                exitLInterp(pal);
            } else {
                applyAnchorInterpAll(pal);
            }
            cancelContrastEdit(pal);
            updateSwatches(block, pal);
            syncEditor(block, pal);
            if (isPrimaryPalette(pal)) afterPrimaryPaletteChange();
            return true;
        }

        function startContrastEdit(block, pal, index, kind) {
            const step = pal.steps[index];
            if (!step || !canEditStepHex(pal, step)) return;
            cancelHexEdit(pal);
            pal.contrastEditIndex = index;
            pal.contrastEditKind = kind;
            setSelection(pal, index);
            updateSwatches(block, pal);
            syncEditor(block, pal);
            requestAnimationFrame(() => {
                const input = block.querySelector(
                    `.swatch[data-step="${index}"] .contrast-input[data-kind="${kind}"]`
                );
                if (!input) return;
                input.focus();
                input.select();
            });
        }

        function setStepLTone(pal, i, l) {
            const step = pal.steps[i];
            if (!step) return;
            const lv = clampSliderVal('l', l);
            if (pal.darkMode) {
                commitDarkModeBaseL(pal, i, lv - dmGainAtIndex(pal, i));
            } else {
                step.l = lv;
                step.hex = modelToHex(step.h, step.s, step.l) ?? step.hex;
            }
        }

        function solveLForTargetLuminance(h, s, targetY, hintL) {
            if (targetY == null) return hintL;
            let bestL = hintL;
            let bestErr = Infinity;
            for (let i = 0; i <= 1000; i++) {
                const l = Math.round(i) / 10;
                const hex = modelToHex(h, s, l);
                if (!hex) continue;
                const y = relativeLuminance(hex);
                if (y == null) continue;
                const err = Math.abs(y - targetY);
                if (err < bestErr) {
                    bestErr = err;
                    bestL = l;
                }
            }
            return Math.round(Math.max(0, Math.min(100, bestL)) * 10) / 10;
        }

        /**
         * Rovnoměrná WCAG škála mezi kotvami (viz Rovnomerna skala.txt):
         * geometrická řada v relativní luminanci Y, první/poslední krok beze změny L.
         */
        function alignAdjacentWcagContrast(pal) {
            const n = pal.steps.length;
            if (n < 2) return false;
            if (n === 2) {
                refreshStepHex(pal);
                return true;
            }

            const y0 = relativeLuminance(pal.steps[0].hex);
            const yN = relativeLuminance(pal.steps[n - 1].hex);
            if (y0 == null || yN == null) return false;

            const segments = n - 1;
            const ratio = Math.pow((yN + 0.05) / (y0 + 0.05), 1 / segments);
            const l0 = pal.steps[0].l;
            const lN = pal.steps[n - 1].l;

            for (let i = 1; i < n - 1; i++) {
                const yTarget = (y0 + 0.05) * Math.pow(ratio, i) - 0.05;
                const step = pal.steps[i];
                const hint = l0 + (lN - l0) * (i / segments);
                const l = solveLForTargetLuminance(step.h, step.s, yTarget, hint);
                setStepLTone(pal, i, l);
            }

            refreshStepHex(pal);
            return true;
        }

        function isPrimaryPalette(pal) {
            return palettes[0] === pal;
        }

        function getPaletteBlock(pi) {
            return document.querySelector(`.palette-block[data-palette-index="${pi}"]`);
        }

        function getPaletteBlockForPal(pal) {
            const pi = palettes.indexOf(pal);
            return pi >= 0 ? getPaletteBlock(pi) : null;
        }

        function getToolbarBgInput(block) {
            const fields = block?.querySelectorAll('.palette-toolbar .toolbar-field input');
            return fields?.[1] ?? null;
        }

        function syncToolbarBgSwatch(block, pal) {
            const bgIn = getToolbarBgInput(block);
            if (!bgIn) return;
            const swatch = bgIn.parentElement?.querySelector('.color-swatch-btn');
            if (swatch) updateToolbarSwatch(swatch, pal.bgHex);
        }

        function commitToolbarBgChange(block, pal, pi) {
            if (!hexToRgb(pal.bgHex)) return;
            if (pi === 0) {
                afterPrimaryPaletteChange();
                if (block) {
                    updateSwatches(block, pal);
                    syncEditor(block, pal);
                }
            } else if (pal.darkMode) {
                recalcStepsLForDarkMode(pal);
                if (block) {
                    updateSwatches(block, pal);
                    syncEditor(block, pal);
                }
            }
        }

        function clampGain(n) {
            return Math.round(Math.max(0, Math.min(100, n)));
        }

        const INTERP_BEZIER_LINEAR = [0, 0, 1, 1];
        const INTERP_BEZIER_PRESETS = {
            linear: { label: 'Lineární', v: [0, 0, 1, 1] },
            ease: { label: 'Ease', v: [0.25, 0.1, 0.25, 1] },
            'ease-in': { label: 'Ease in', v: [0.42, 0, 1, 1] },
            'ease-out': { label: 'Ease out', v: [0, 0, 0.58, 1] },
            'ease-in-out': { label: 'Ease in-out', v: [0.42, 0, 0.58, 1] }
        };

        function interpCurveKey(prop, segIndex) {
            return `${prop}:${segIndex}`;
        }

        function ensureInterpCurve(pal, prop, segIndex) {
            if (!pal.interpCurves) pal.interpCurves = {};
            const key = interpCurveKey(prop, segIndex);
            if (!pal.interpCurves[key]) {
                pal.interpCurves[key] = INTERP_BEZIER_LINEAR.slice();
            }
        }

        function getInterpCurve(pal, prop, segIndex) {
            if (!pal.interpCurves) pal.interpCurves = {};
            const key = interpCurveKey(prop, segIndex);
            if (!pal.interpCurves[key] && prop === 'gain' && segIndex === 0 && pal.dmGainBezier?.length === 4) {
                pal.interpCurves[key] = pal.dmGainBezier.map(v => Math.max(0, Math.min(1, Number(v))));
            }
            ensureInterpCurve(pal, prop, segIndex);
            return pal.interpCurves[key].map(v => Math.max(0, Math.min(1, Number(v))));
        }

        function setInterpCurve(pal, prop, segIndex, b) {
            if (!pal.interpCurves) pal.interpCurves = {};
            pal.interpCurves[interpCurveKey(prop, segIndex)] =
                b.map(v => Math.max(0, Math.min(1, Number(v))));
            if (prop === 'gain' && segIndex === 0) {
                pal.dmGainBezier = pal.interpCurves[interpCurveKey(prop, segIndex)].slice();
            }
        }

        function formatBezierCss(b) {
            const parts = b.map(v => {
                const s = (Math.round(v * 1000) / 1000).toFixed(3);
                return s.replace(/\.?0+$/, '') || '0';
            });
            return `cubic-bezier(${parts.join(', ')})`;
        }

        function parseBezierInput(raw) {
            const s = String(raw ?? '').trim();
            const m = s.match(/cubic-bezier\s*\(\s*([^)]+)\)/i);
            const nums = (m ? m[1] : s).split(/[\s,]+/).map(Number).filter(n => !Number.isNaN(n));
            if (nums.length !== 4) return null;
            return nums.map(v => Math.max(0, Math.min(1, v)));
        }

        function bezierAxis(u, p0, p1, p2, p3) {
            const t = 1 - u;
            return t * t * t * p0 + 3 * t * t * u * p1 + 3 * t * u * u * p2 + u * u * u * p3;
        }

        function sampleInterpBezier(x, b) {
            const [x1, y1, x2, y2] = b;
            x = Math.max(0, Math.min(1, x));
            if (x <= 0) return 0;
            if (x >= 1) return 1;
            let lo = 0;
            let hi = 1;
            for (let i = 0; i < 24; i++) {
                const mid = (lo + hi) / 2;
                if (bezierAxis(mid, 0, x1, x2, 1) < x) lo = mid;
                else hi = mid;
            }
            const u = (lo + hi) / 2;
            return Math.max(0, Math.min(1, bezierAxis(u, 0, y1, y2, 1)));
        }

        function dmGainAtIndex(pal, i) {
            if (!pal.dmGainRamp) return pal.dmGain ?? 0;
            const n = pal.steps.length;
            const start = pal.dmGainStart ?? 0;
            const end = pal.dmGainEnd ?? 0;
            if (n < 2) return start;
            const t = i / (n - 1);
            const eased = sampleInterpBezier(t, getInterpCurve(pal, 'gain', 0));
            return start + (end - start) * eased;
        }

        function isSliderInterpActive(pal, prop, wrap) {
            if (!wrap) return false;
            if (prop === 'gain') return pal.darkMode && pal.dmGainRamp;
            if (isAnchorMode(pal) && getPinnedIndices(pal).length >= 2) {
                if (prop === 'l') return pal.lInterp;
                if (prop === 'h') return hsPinViewEnabled(pal, 'h');
                if (prop === 's') return hsPinViewEnabled(pal, 's');
            }
            if (prop === 'h') return wrap.classList.contains('ramp-mode');
            if (prop === 's') return wrap.classList.contains('ramp-mode');
            if (prop === 'l') return pal.lInterp;
            return false;
        }

        function pickAnchorSegmentByX(wrap, pal, prop, clientX) {
            const anchors = getPinnedIndices(pal);
            if (anchors.length < 2) return 0;
            const { min, max } = rampRange(prop);
            const rect = wrap.getBoundingClientRect();
            const x = clientX - rect.left;
            const w = rect.width || 1;
            for (let a = 0; a < anchors.length - 1; a++) {
                const v0 = pal.steps[anchors[a]][prop];
                const v1 = pal.steps[anchors[a + 1]][prop];
                const x0 = (valueToTrackPct(v0, min, max, w) / 100) * w;
                const x1 = (valueToTrackPct(v1, min, max, w) / 100) * w;
                if (x >= Math.min(x0, x1) && x <= Math.max(x0, x1)) return a;
            }
            let best = 0;
            let bestD = Infinity;
            for (let a = 0; a < anchors.length - 1; a++) {
                const v0 = pal.steps[anchors[a]][prop];
                const v1 = pal.steps[anchors[a + 1]][prop];
                const x0 = (valueToTrackPct(v0, min, max, w) / 100) * w;
                const x1 = (valueToTrackPct(v1, min, max, w) / 100) * w;
                const d = Math.abs(x - (x0 + x1) / 2);
                if (d < bestD) {
                    bestD = d;
                    best = a;
                }
            }
            return best;
        }

        function pickInterpSegmentIndex(pal, prop, wrap, clientX) {
            if (usePropPinHandles(pal, prop)) {
                return pickAnchorSegmentByX(wrap, pal, prop, clientX);
            }
            if (prop === 'l' && useLPinHandles(pal)) {
                return pickLPinSegmentByX(wrap, pal, clientX);
            }
            return 0;
        }

        function pickLPinSegmentByX(wrap, pal, clientX) {
            const anchors = getPinnedIndices(pal);
            if (anchors.length < 2) return 0;
            const rect = wrap.getBoundingClientRect();
            const x = clientX - rect.left;
            const w = rect.width || 1;
            for (let a = 0; a < anchors.length - 1; a++) {
                const x0 = (valueToTrackPct(pal.steps[anchors[a]].l, 0, 100, w) / 100) * w;
                const x1 = (valueToTrackPct(pal.steps[anchors[a + 1]].l, 0, 100, w) / 100) * w;
                if (x >= Math.min(x0, x1) && x <= Math.max(x0, x1)) return a;
            }
            let best = 0;
            let bestD = Infinity;
            for (let a = 0; a < anchors.length - 1; a++) {
                const x0 = (valueToTrackPct(pal.steps[anchors[a]].l, 0, 100, w) / 100) * w;
                const x1 = (valueToTrackPct(pal.steps[anchors[a + 1]].l, 0, 100, w) / 100) * w;
                const d = Math.abs(x - (x0 + x1) / 2);
                if (d < bestD) {
                    bestD = d;
                    best = a;
                }
            }
            return best;
        }

        function interpSegmentTitle(pal, prop, segIndex) {
            const anchors = getPinnedIndices(pal);
            if (usePropPinHandles(pal, prop) || (prop === 'l' && useLPinHandles(pal))) {
                const i0 = anchors[segIndex];
                const i1 = anchors[segIndex + 1];
                if (i0 != null && i1 != null) {
                    return `Křivka · ${stepScaleName(i0)}–${stepScaleName(i1)}`;
                }
            }
            if (prop === 'gain') return 'Křivka · Gain';
            const labels = AXIS_LABELS[colorSpace];
            if (prop === 'h') return `Křivka · ${labels.h}`;
            if (prop === 's') return `Křivka · ${labels.s}`;
            if (prop === 'l') return `Křivka · ${labels.l}`;
            return 'Křivka interpolace';
        }

        function applyInterpForProp(block, pal, prop) {
            if (prop === 'gain') {
                applyDmGainAll(pal);
                if (block) {
                    syncDmGainUi(block, pal);
                    updateSwatches(block, pal);
                    syncEditor(block, pal);
                }
                if (isPrimaryPalette(pal)) afterPrimaryPaletteChange();
                return;
            }
            if (isAnchorMode(pal)) {
                if (prop === 'l') applyAnchorInterpL(pal);
                else if (prop === 'h' || prop === 's') {
                    if (usePropPinHandles(pal, prop)) applyAnchorInterpProp(pal, prop);
                    else applyPropRamp(pal, prop);
                }
            } else if (prop === 'l') applyLInterp(pal);
            else if (prop === 'h' || prop === 's') applyPropRamp(pal, prop);
            if (block) {
                updateSwatches(block, pal);
                syncEditor(block, pal);
            }
            if (isPrimaryPalette(pal)) afterPrimaryPaletteChange();
        }

        function ensureInterpCurvesForPalette(pal, prop) {
            if (usePropPinHandles(pal, prop) || (prop === 'l' && useLPinHandles(pal))) {
                const anchors = getPinnedIndices(pal);
                for (let a = 0; a < anchors.length - 1; a++) {
                    ensureInterpCurve(pal, prop, a);
                }
            } else {
                ensureInterpCurve(pal, prop, 0);
            }
        }

        let interpCtxMenuEl = null;
        let swatchCtxMenuEl = null;
        let bezierEditorOpen = null;

        function closeInterpCtxMenu() {

            const row = getPaletteRow(block);
            if (!row) return;

            row.classList.add('chips-visible', 'chips-locked');
        }

        function terminalChipFgHex(bgHex) {
            return isLightHex(bgHex) ? '#FFFFFF' : '#000000';
        }

        function showInterpContextMenu(e, block, pal, wrap, prop) {
            if (!isSliderInterpActive(pal, prop, wrap)) return;

            interpCtxMenuEl = menu;

                document.addEventListener('click', closeInterpCtxMenu, { once: true });
