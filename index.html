        function closeBezierEditor() {
            if (!bezierEditorOpen) return;
            document.removeEventListener('keydown', bezierEditorOpen.onKey);
            document.removeEventListener('pointerdown', bezierEditorOpen.onDocPointerDown, true);
            bezierEditorOpen.panel.remove();
            bezierEditorOpen = null;
        }

        function positionFloatingPanel(panel, anchor) {
            const rect = anchor.getBoundingClientRect();
            const margin = 6;
            let top = rect.bottom + margin;
            let left = rect.left;
            panel.style.visibility = 'hidden';
            panel.style.top = '0';
            panel.style.left = '0';
            const pw = panel.offsetWidth;
            const ph = panel.offsetHeight;
            if (left + pw > window.innerWidth - margin) {
                left = Math.max(margin, window.innerWidth - pw - margin);
            }
            if (top + ph > window.innerHeight - margin) {
                top = Math.max(margin, rect.top - ph - margin);
            }
            panel.style.left = left + 'px';
            panel.style.top = top + 'px';
            panel.style.visibility = '';
        }

        function openInterpBezierEditor(block, pal, anchor, prop, segIndex) {
            if (!isSliderInterpActive(pal, prop, anchor)) return;
            const editorKey = `${prop}:${segIndex}`;
            if (bezierEditorOpen?.block === block && bezierEditorOpen?.key === editorKey) {
                closeBezierEditor();
                return;
            }
            closeBezierEditor();
            pushHistory();

            let bez = getInterpCurve(pal, prop, segIndex).slice();
            const panel = document.createElement('div');
            panel.className = 'bezier-editor-popover';
            panel.setAttribute('role', 'dialog');
            panel.setAttribute('aria-label', 'Křivka interpolace');

            const head = document.createElement('div');
            head.className = 'bezier-editor-head';
            const title = document.createElement('div');
            title.className = 'bezier-editor-title';
            title.textContent = interpSegmentTitle(pal, prop, segIndex);
            const closeBtn = document.createElement('button');
            closeBtn.type = 'button';
            closeBtn.className = 'bezier-editor-close';
            closeBtn.title = 'Zavřít';
            closeBtn.textContent = '×';
            head.append(title, closeBtn);

            const graphWrap = document.createElement('div');
            graphWrap.className = 'bezier-graph-wrap';
            const svgNs = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(svgNs, 'svg');
            svg.setAttribute('class', 'bezier-graph');
            svg.setAttribute('viewBox', '0 0 220 220');

            const grid = document.createElementNS(svgNs, 'rect');
            grid.setAttribute('x', '20');
            grid.setAttribute('y', '20');
            grid.setAttribute('width', '180');
            grid.setAttribute('height', '180');
            grid.setAttribute('fill', '#111118');
            grid.setAttribute('stroke', '#2a2a36');

            const diag = document.createElementNS(svgNs, 'line');
            diag.setAttribute('stroke', '#334155');
            diag.setAttribute('stroke-dasharray', '4 3');

            const line1 = document.createElementNS(svgNs, 'line');
            line1.setAttribute('stroke', '#64748b');
            line1.setAttribute('stroke-width', '1');
            const line2 = document.createElementNS(svgNs, 'line');
            line2.setAttribute('stroke', '#64748b');
            line2.setAttribute('stroke-width', '1');

            const curve = document.createElementNS(svgNs, 'path');
            curve.setAttribute('fill', 'none');
            curve.setAttribute('stroke', 'var(--accent)');
            curve.setAttribute('stroke-width', '2.5');

            const p0 = document.createElementNS(svgNs, 'circle');
            p0.setAttribute('r', '4');
            p0.setAttribute('fill', '#94a3b8');
            const p3 = document.createElementNS(svgNs, 'circle');
            p3.setAttribute('r', '4');
            p3.setAttribute('fill', '#94a3b8');

            const h1 = document.createElementNS(svgNs, 'circle');
            h1.setAttribute('class', 'bezier-handle');
            h1.setAttribute('r', '7');
            h1.dataset.handle = '1';
            const h2 = document.createElementNS(svgNs, 'circle');
            h2.setAttribute('class', 'bezier-handle');
            h2.setAttribute('r', '7');
            h2.dataset.handle = '2';

            svg.append(grid, diag, line1, line2, curve, p0, p3, h1, h2);
            graphWrap.appendChild(svg);

            const cssRow = document.createElement('label');
            cssRow.className = 'bezier-css-row';
            cssRow.textContent = 'Zápis ';
            const cssIn = document.createElement('input');
            cssIn.type = 'text';
            cssIn.spellcheck = false;
            cssIn.autocomplete = 'off';
            cssRow.appendChild(cssIn);

            const presetsWrap = document.createElement('div');
            presetsWrap.className = 'bezier-presets';
            const presetBtns = {};
            Object.entries(INTERP_BEZIER_PRESETS).forEach(([id, { label, v }]) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = label;
                btn.dataset.preset = id;
                presetBtns[id] = btn;
                presetsWrap.appendChild(btn);
            });

            panel.append(head, graphWrap, cssRow, presetsWrap);
            document.body.appendChild(panel);

            const commitLive = () => {
                setInterpCurve(pal, prop, segIndex, bez);
                applyInterpForProp(block, pal, prop);
            };

            const plot = { x: 20, y: 20, w: 180, h: 180 };

            const toSvg = (bx, by) => ({
                x: plot.x + bx * plot.w,
                y: plot.y + (1 - by) * plot.h
            });

            const fromSvg = (sx, sy) => ({
                x: Math.max(0, Math.min(1, (sx - plot.x) / plot.w)),
                y: Math.max(0, Math.min(1, 1 - (sy - plot.y) / plot.h))
            });

            const curvePath = () => {
                const a = toSvg(0, 0);
                const b = toSvg(bez[0], bez[1]);
                const c = toSvg(bez[2], bez[3]);
                const d = toSvg(1, 1);
                return `M ${a.x} ${a.y} C ${b.x} ${b.y}, ${c.x} ${c.y}, ${d.x} ${d.y}`;
            };

            const updatePresetActive = () => {
                Object.entries(INTERP_BEZIER_PRESETS).forEach(([id, { v }]) => {
                    const match = v.every((n, i) => Math.abs(n - bez[i]) < 0.001);
                    presetBtns[id].classList.toggle('active', match);
                });
            };

            const redraw = () => {
                const s = toSvg(0, 0);
                const e = toSvg(1, 1);
                const c1 = toSvg(bez[0], bez[1]);
                const c2 = toSvg(bez[2], bez[3]);
                diag.setAttribute('x1', String(s.x));
                diag.setAttribute('y1', String(s.y));
                diag.setAttribute('x2', String(e.x));
                diag.setAttribute('y2', String(e.y));
                line1.setAttribute('x1', String(s.x));
                line1.setAttribute('y1', String(s.y));
                line1.setAttribute('x2', String(c1.x));
                line1.setAttribute('y2', String(c1.y));
                line2.setAttribute('x1', String(c2.x));
                line2.setAttribute('y1', String(c2.y));
                line2.setAttribute('x2', String(e.x));
                line2.setAttribute('y2', String(e.y));
                p0.setAttribute('cx', String(s.x));
                p0.setAttribute('cy', String(s.y));
                p3.setAttribute('cx', String(e.x));
                p3.setAttribute('cy', String(e.y));
                h1.setAttribute('cx', String(c1.x));
                h1.setAttribute('cy', String(c1.y));
                h2.setAttribute('cx', String(c2.x));
                h2.setAttribute('cy', String(c2.y));
                curve.setAttribute('d', curvePath());
                cssIn.value = formatBezierCss(bez);
                updatePresetActive();
                commitLive();
            };

            let dragHandle = null;

            const onHandlePointerDown = (e, idx) => {
                if (e.button !== 0) return;
                e.preventDefault();
                e.stopPropagation();
                dragHandle = idx;
                (e.currentTarget).setPointerCapture(e.pointerId);
            };

            const onSvgPointerMove = (e) => {
                if (dragHandle == null) return;
                const pt = svg.createSVGPoint();
                pt.x = e.clientX;
                pt.y = e.clientY;
                const ctm = svg.getScreenCTM();
                if (!ctm) return;
                const loc = pt.matrixTransform(ctm.inverse());
                const { x, y } = fromSvg(loc.x, loc.y);
                if (dragHandle === 1) {
                    bez[0] = x;
                    bez[1] = y;
                } else {
                    bez[2] = x;
                    bez[3] = y;
                }
                redraw();
            };

            const endDrag = () => { dragHandle = null; };

            h1.addEventListener('pointerdown', e => onHandlePointerDown(e, 1));
            h2.addEventListener('pointerdown', e => onHandlePointerDown(e, 2));
            svg.addEventListener('pointermove', onSvgPointerMove);
            svg.addEventListener('pointerup', endDrag);
            svg.addEventListener('lostpointercapture', endDrag);

            cssIn.oninput = () => {
                const parsed = parseBezierInput(cssIn.value);
                if (!parsed) return;
                bez = parsed;
                redraw();
            };
            cssIn.onkeydown = (e) => {
                if (e.key === 'Enter') cssIn.blur();
            };

            presetsWrap.addEventListener('click', (e) => {
                const btn = e.target.closest('button[data-preset]');
                if (!btn) return;
                const preset = INTERP_BEZIER_PRESETS[btn.dataset.preset];
                if (!preset) return;
                bez = preset.v.slice();
                redraw();
            });

            closeBtn.onclick = () => closeBezierEditor();
            panel.addEventListener('pointerdown', (e) => e.stopPropagation());

            let panelDrag = null;
            head.addEventListener('pointerdown', (e) => {
                if (e.button !== 0 || e.target.closest('.bezier-editor-close')) return;
                e.preventDefault();
                e.stopPropagation();
                const rect = panel.getBoundingClientRect();
                panelDrag = {
                    startX: e.clientX,
                    startY: e.clientY,
                    left: rect.left,
                    top: rect.top
                };
                head.classList.add('is-dragging');
                head.setPointerCapture(e.pointerId);
            });
            head.addEventListener('pointermove', (e) => {
                if (!panelDrag) return;
                panel.style.left = (panelDrag.left + e.clientX - panelDrag.startX) + 'px';
                panel.style.top = (panelDrag.top + e.clientY - panelDrag.startY) + 'px';
            });
            const endPanelDrag = () => {
                panelDrag = null;
                head.classList.remove('is-dragging');
            };
            head.addEventListener('pointerup', endPanelDrag);
            head.addEventListener('lostpointercapture', endPanelDrag);

            const onKey = (e) => {
                if (e.key === 'Escape') closeBezierEditor();
            };
            const onDocPointerDown = (e) => {
                if (panel.contains(e.target) || anchor.contains(e.target)) return;
                closeBezierEditor();
            };
            document.addEventListener('keydown', onKey);
            document.addEventListener('pointerdown', onDocPointerDown, true);

            bezierEditorOpen = { panel, onKey, onDocPointerDown, block, key: editorKey };
            redraw();
            positionFloatingPanel(panel, anchor);
            requestAnimationFrame(() => positionFloatingPanel(panel, anchor));
        }

        function applyDmGainStep(pal, i) {
            const step = pal.steps[i];
            if (!step || !pal.dmBaseL) return;
            const base = pal.dmBaseL[i];
            if (base == null) return;
            step.l = clampSliderVal('l', base + dmGainAtIndex(pal, i));
            step.hex = modelToHex(step.h, step.s, step.l) ?? step.hex;
        }

        function applyDmGainAll(pal) {
            if (!pal.darkMode || !pal.dmBaseL?.length) return;
            pal.steps.forEach((_, i) => applyDmGainStep(pal, i));
        }

        function commitDarkModeBaseL(pal, i, baseL) {
            if (!pal.dmBaseL) pal.dmBaseL = [];
            pal.dmBaseL[i] = clampSliderVal('l', baseL);
            applyDmGainStep(pal, i);
        }

        /** APCA cíl pro solver — při jiné polaritě pozadí než master obrátit znaménko. */
        function apcaTargetForDmBg(rawLc, masterBg, dmBg) {
            if (rawLc == null || !hexToRgb(masterBg) || !hexToRgb(dmBg)) return rawLc;
            if (isLightHex(masterBg) === isLightHex(dmBg)) return rawLc;
            if (rawLc === 0) return 0;
            return -rawLc;
        }

        function masterContrastsAt(i) {
            const primary = palettes[0];
            if (!primary) return { wcag: null, apca: null };
            const pi = Math.min(i, primary.steps.length - 1);
            const pStep = primary.steps[pi];
            const bg = primary.bgHex;
            return {
                wcag: calcWcagRatio(pStep.hex, bg),
                apca: getApcaContrast(pStep.hex, bg)
            };
        }

        function masterContrastSnapEqual(a, b) {
            if (!a || !b) return false;
            const wOk = (a.wcag == null && b.wcag == null) ||
                (a.wcag != null && b.wcag != null && Math.abs(a.wcag - b.wcag) < 0.01);
            const aOk = (a.apca == null && b.apca == null) ||
                (a.apca != null && b.apca != null && Math.abs(a.apca - b.apca) < 0.05);
            return wOk && aOk;
        }

        function dmMetric(pal) {
            return pal.dmContrastMetric === 'apca' ? 'apca' : 'wcag';
        }

        function masterContrastChanged(prev, cur, metric) {
            if (!cur) return false;
            if (!prev) return true;
            if (metric === 'apca') {
                if (cur.apca == null && prev.apca == null) return false;
                if (cur.apca == null || prev.apca == null) return true;
                return Math.abs(cur.apca - prev.apca) >= 0.05;
            }
            if (cur.wcag == null && prev.wcag == null) return false;
            if (cur.wcag == null || prev.wcag == null) return true;
            return Math.abs(cur.wcag - prev.wcag) >= 0.01;
        }

        function snapshotDarkModeColorsFromPrimary(pal) {
            const primary = palettes[0];
            if (!primary) return;
            if (!pal.dmBaseL) pal.dmBaseL = [];
            pal.steps.forEach((step, i) => {
                const pi = Math.min(i, primary.steps.length - 1);
                const ps = primary.steps[pi];
                step.h = ps.h;
                step.s = ps.s;
                step.l = ps.l;
                step.hex = ps.hex;
                step.pinned = !!ps.pinned;
                pal.dmBaseL[i] = clampSliderVal('l', ps.l);
            });
            applyDmGainAll(pal);
        }

        function captureDarkModeContrastTargets(pal) {
            const primary = palettes[0];
            if (!primary || !hexToRgb(primary.bgHex)) return;
            pal.darkModeRefBg = primary.bgHex;
            pal.darkModeWcagTargets = [];
            pal.darkModeApcaTargets = [];
            pal.dmMasterContrastSnap = [];
            pal.steps.forEach((_, i) => {
                const c = masterContrastsAt(i);
                pal.darkModeWcagTargets[i] = c.wcag;
                pal.darkModeApcaTargets[i] = c.apca;
                pal.dmMasterContrastSnap[i] = { wcag: c.wcag, apca: c.apca };
            });
        }

        function recalcDarkModeStepL(pal, i) {
            const step = pal.steps[i];
            if (!step || !hexToRgb(pal.bgHex)) return;
            const hintL = pal.dmBaseL?.[i] ?? step.l;
            const metric = dmMetric(pal);
            let baseL = hintL;
            if (metric === 'apca') {
                const apcaT = apcaTargetForDmBg(
                    pal.darkModeApcaTargets?.[i],
                    pal.darkModeRefBg,
                    pal.bgHex
                );
                if (apcaT != null) {
                    baseL = solveLForApca(step.h, step.s, apcaT, pal.bgHex, hintL);
                }
            } else {
                const wcagT = pal.darkModeWcagTargets?.[i];
                if (wcagT != null) {
                    baseL = solveLForWcag(step.h, step.s, wcagT, pal.bgHex, hintL);
                }
            }
            commitDarkModeBaseL(pal, i, baseL);
        }

        function recalcStepsLForDarkMode(pal) {
            if (!pal.darkMode || !hexToRgb(pal.bgHex)) return;
            const metric = dmMetric(pal);
            if (metric === 'apca') {
                if (!pal.darkModeApcaTargets?.length) return;
            } else if (!pal.darkModeWcagTargets?.length) {
                return;
            }
            pal.steps.forEach((_, i) => recalcDarkModeStepL(pal, i));
        }

        function initDarkModeFromPrimary(pal) {
            snapshotDarkModeColorsFromPrimary(pal);
            captureDarkModeContrastTargets(pal);
            pal.steps.forEach((_, i) => recalcDarkModeStepL(pal, i));
        }

        function syncDarkModeContrastsFromPrimary(pal) {
            if (!pal.darkMode) return;
            const primary = palettes[0];
            if (!primary || !hexToRgb(primary.bgHex)) return;
            if (!pal.darkModeWcagTargets?.length) captureDarkModeContrastTargets(pal);

            const masterBg = primary.bgHex;
            if (pal.darkModeRefBg !== masterBg) {
                pal.darkModeRefBg = masterBg;
                pal.steps.forEach((_, i) => recalcDarkModeStepL(pal, i));
            }

            const metric = dmMetric(pal);
            pal.steps.forEach((_, i) => {
                const cur = masterContrastsAt(i);
                const prev = pal.dmMasterContrastSnap?.[i];
                if (!masterContrastChanged(prev, cur, metric)) return;
                pal.darkModeWcagTargets[i] = cur.wcag;
                pal.darkModeApcaTargets[i] = cur.apca;
                if (!pal.dmMasterContrastSnap) pal.dmMasterContrastSnap = [];
                pal.dmMasterContrastSnap[i] = { wcag: cur.wcag, apca: cur.apca };
                recalcDarkModeStepL(pal, i);
            });
        }

        function syncDarkModePaletteFromPrimary(pal, fullSnapshot = false) {
            if (!pal.darkMode || isPrimaryPalette(pal)) return;
            const lenMismatch = !pal.dmMasterContrastSnap?.length ||
                pal.dmMasterContrastSnap.length !== pal.steps.length;
            if (fullSnapshot || lenMismatch) {
                initDarkModeFromPrimary(pal);
            } else {
                syncDarkModeContrastsFromPrimary(pal);
            }
            const block = getPaletteBlockForPal(pal);
            if (block) applyDarkModeUi(block, pal, getToolbarBgInput(block));
        }

        function syncAllDarkModeFromPrimary() {
            for (let i = 1; i < palettes.length; i++) {
                const pal = palettes[i];
                if (pal.darkMode) syncDarkModePaletteFromPrimary(pal);
            }
        }

        function afterPrimaryPaletteChange() {
            syncAllDarkModeFromPrimary();
        }

        function updateDmDarkToolbarVisibility(block, pal) {
            const show = !!pal.darkMode;
            block.querySelectorAll('.dm-gain-field, .dm-contrast-metric-field').forEach(field => {
                field.hidden = !show;
                field.classList.toggle('dm-gain-hidden', !show);
            });
        }

        function syncDmContrastMetricUi(block, pal) {
            const field = block.querySelector('.dm-contrast-metric-field');
            if (!field) return;
            const metric = dmMetric(pal);
            field.querySelectorAll('[data-dm-metric]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.dmMetric === metric);
            });
        }

        function setDmContrastMetric(block, pal, metric) {
            if (!pal.darkMode) return;
            const next = metric === 'apca' ? 'apca' : 'wcag';
            if (dmMetric(pal) === next) return;
            pushHistory();
            pal.dmContrastMetric = next;
            pal.steps.forEach((_, i) => recalcDarkModeStepL(pal, i));
            syncDmContrastMetricUi(block, pal);
            updateSwatches(block, pal);
            syncEditor(block, pal);
        }

        function syncDmGainUi(block, pal) {
            const wrap = block.querySelector('.slider-ramp-wrap[data-prop="gain"]');
            if (!wrap) return;
            updateDmDarkToolbarVisibility(block, pal);
            if (!pal.darkMode) return;
            wrap.classList.toggle('ramp-mode', !!pal.dmGainRamp);
            if (pal.dmGainRamp) {
                const b = getInterpCurve(pal, 'gain', 0);
                const linear = b.every((v, i) => Math.abs(v - INTERP_BEZIER_LINEAR[i]) < 0.001);
                wrap.title = linear
                    ? 'Alt+klik: rampa začátek–konec. Pravý klik: křivka interpolace.'
                    : `Rampa (${formatBezierCss(b)}). Pravý klik: křivka interpolace.`;
            } else {
                wrap.title = 'Alt+klik: rampa začátek–konec';
            }
            if (!pal.dmGainRamp) {
                hideRampHints(wrap);
                wrap.querySelector('.ramp-single').value = pal.dmGain ?? 0;
                setValDisplay(block, pal, 'gain', [String(pal.dmGain ?? 0)]);
            } else {
                wrap.querySelector('.ramp-min').value = pal.dmGainStart ?? 0;
                wrap.querySelector('.ramp-max').value = pal.dmGainEnd ?? 0;
                setValDisplay(block, pal, 'gain',
                    [String(pal.dmGainStart ?? 0), String(pal.dmGainEnd ?? 0)], '–');
            }
            updateSliderTrack(block, pal, 'gain');
            const valWrap = block.querySelector('.val-wrap[data-prop="gain"]');
            if (valWrap) valWrap.classList.toggle('val-editable', pal.darkMode);
        }

        function applyDarkModeUi(block, pal, bgInput) {
            const bgIn = bgInput ?? getToolbarBgInput(block);
            if (bgIn) bgIn.value = toolbarHexDisplay(pal.bgHex);
            syncToolbarBgSwatch(block, pal);
            applyBgPreview(block, pal);
            updateSwatches(block, pal);
            syncEditor(block, pal);
            syncDmGainUi(block, pal);
            syncDmContrastMetricUi(block, pal);
        }

        function setDarkMode(block, pal, on, bgInput, darkBtn) {
            pushHistory();
            if (on) {
                pal.darkMode = true;
                if (!pal.dmContrastMetric) pal.dmContrastMetric = 'wcag';
                pal.bgHex = '#000000';
                initDarkModeFromPrimary(pal);
            } else {
                pal.darkMode = false;
                pal.darkModeWcagTargets = null;
                pal.darkModeApcaTargets = null;
                pal.darkModeRefBg = null;
                pal.dmMasterContrastSnap = null;
                pal.dmBaseL = null;
            }
            if (darkBtn) darkBtn.classList.toggle('active', pal.darkMode);
            updateDmDarkToolbarVisibility(block, pal);
            applyDarkModeUi(block, pal, bgInput);
        }

        function onDmGainSlider(block, pal, raw) {
            if (!pal.darkMode) return;
            pal.dmGain = clampGain(parseFloat(raw));
            const wrap = block.querySelector('.slider-ramp-wrap[data-prop="gain"]');
            if (wrap) wrap.querySelector('.ramp-single').value = pal.dmGain;
            applyDmGainAll(pal);
            syncDmGainUi(block, pal);
            updateSwatches(block, pal);
            syncEditor(block, pal);
        }

        function onDmGainRampSlider(block, pal, which, raw) {
            if (!pal.darkMode) return;
            const v = clampGain(parseFloat(raw));
            const wrap = block.querySelector('.slider-ramp-wrap[data-prop="gain"]');
            if (!wrap) return;
            if (which === 'min') pal.dmGainStart = v;
            else pal.dmGainEnd = v;
            wrap.querySelector('.ramp-min').value = pal.dmGainStart;
            wrap.querySelector('.ramp-max').value = pal.dmGainEnd;
            applyDmGainAll(pal);
            syncDmGainUi(block, pal);
            updateSwatches(block, pal);
            syncEditor(block, pal);
        }

        function toggleDmGainRamp(block, pal) {
            if (!pal.darkMode) return;
            pal.dmGainRamp = !pal.dmGainRamp;
            if (pal.dmGainRamp) {
                const g = pal.dmGain ?? 0;
                pal.dmGainStart = g;
                pal.dmGainEnd = g;
                ensureInterpCurve(pal, 'gain', 0);
            } else {
                pal.dmGain = clampGain((pal.dmGainStart + pal.dmGainEnd) / 2);
            }
            applyDmGainAll(pal);
            syncDmGainUi(block, pal);
            updateSwatches(block, pal);
            syncEditor(block, pal);
        }

        function copyHex(el, hex) {
            navigator.clipboard?.writeText(hex);
            const prev = el.textContent;
            el.textContent = 'Zkopírováno';
            setTimeout(() => { el.textContent = prev; }, 700);
        }

        const DEFAULT_STEPS = 10;
        const DEFAULT_HEX = '#C00000';
        const DEFAULT_BG = '#FFFFFF';

        let palettes = [];
        let sharedStepCount = DEFAULT_STEPS;
        const HISTORY_MAX = 40;
        let historyPast = [];
        let historyFuture = [];
        let historyDragDepth = 0;

        const $ = id => document.getElementById(id);

        function cloneAppState() {
            return {
                palettes: structuredClone(palettes),
                sharedStepCount,
                colorSpace
            };
        }

        function normalizePalettesAfterRestore() {
            palettes.forEach(pal => {
                pal.valEdit = null;
                pal.hexEditIndex = null;
                delete pal.hexEditT;
                delete pal.selectedT;
                if (!pal.dmContrastMetric) pal.dmContrastMetric = 'wcag';
            });
        }

        function restoreAppState(snap) {
            palettes = structuredClone(snap.palettes);
            normalizePalettesAfterRestore();
            sharedStepCount = snap.sharedStepCount;
            colorSpace = snap.colorSpace;
            closeColorPicker();
            closeInterpCtxMenu();
            closeSwatchCtxMenu();
            closeBezierEditor();
            render();
            afterPrimaryPaletteChange();
            updateHistoryUi();
        }

        function updateHistoryUi() {
            const undoBtn = $('historyUndoBtn');
            const redoBtn = $('historyRedoBtn');
            if (!undoBtn || !redoBtn) return;
            undoBtn.disabled = historyPast.length === 0;
            redoBtn.disabled = historyFuture.length === 0;
        }

        function pushHistory() {
            if (historyDragDepth > 0) return;
            historyPast.push(cloneAppState());
            if (historyPast.length > HISTORY_MAX) historyPast.shift();
            historyFuture.length = 0;
            updateHistoryUi();
        }

        function historyDragStart() {
            if (historyDragDepth === 0) pushHistory();
            historyDragDepth++;
        }

        function historyDragEnd() {
            historyDragDepth = Math.max(0, historyDragDepth - 1);
        }

        function undoHistory() {
            if (!historyPast.length) return;
            historyFuture.push(cloneAppState());
            restoreAppState(historyPast.pop());
        }

        function redoHistory() {
            if (!historyFuture.length) return;
            historyPast.push(cloneAppState());
            restoreAppState(historyFuture.pop());
        }

        let historyGlobalListenersInited = false;

        function bindHistoryButtons() {
            const undoBtn = $('historyUndoBtn');
            const redoBtn = $('historyRedoBtn');
            if (!undoBtn || !redoBtn || undoBtn.dataset.bound === '1') return;
            undoBtn.dataset.bound = '1';
            redoBtn.dataset.bound = '1';
            undoBtn.addEventListener('click', () => undoHistory());
            redoBtn.addEventListener('click', () => redoHistory());
        }

        function initHistoryUi() {
            if (!historyGlobalListenersInited) {
                historyGlobalListenersInited = true;
                document.addEventListener('keydown', (e) => {
                    if (e.target.closest('input, textarea, [contenteditable="true"]')) return;
                    const mod = e.ctrlKey || e.metaKey;
                    if (!mod) return;
                    if (e.key === 'z' && !e.shiftKey) {
                        e.preventDefault();
                        undoHistory();
                    } else if (e.key === 'y' || (e.key === 'z' && e.shiftKey)) {
                        e.preventDefault();
                        redoHistory();
                    }
                });
                document.addEventListener('pointerup', () => historyDragEnd());
                document.addEventListener('pointercancel', () => historyDragEnd());
            }
            bindHistoryButtons();
            updateHistoryUi();
        }

        function stepPinT(step, index, n) {
            if (step.pinT != null) return step.pinT;
            return n > 1 ? index / (n - 1) : 0;
        }

        function pinTToIndex(pinT, n) {
            if (n <= 1) return 0;
            return Math.max(0, Math.min(n - 1, Math.round(pinT * (n - 1))));
        }

        function assignPinsToIndices(pins, n) {
            if (n <= 1) return pins.length ? [{ pin: pins[0], idx: 0 }] : [];
            const sorted = [...pins].sort((a, b) => a.t - b.t);
            const used = new Set();
            const out = [];
            for (const pin of sorted) {
                let idx = pinTToIndex(pin.t, n);
                if (!used.has(idx)) {
                    used.add(idx);
                    out.push({ pin, idx });
                    continue;
                }
                let placed = false;
                for (let d = 1; d < n && !placed; d++) {
                    for (const c of [idx - d, idx + d]) {
                        if (c >= 0 && c < n && !used.has(c)) {
                            used.add(c);
                            out.push({ pin, idx: c });
                            placed = true;
                            break;
                        }
                    }
                }
            }
            return out;
        }

        function remapIndexByT(t, n, pinAssignments) {
            const hit = pinAssignments.find(a => a.pin.t === t);
            return hit ? hit.idx : pinTToIndex(t, n);
        }

        function setSelection(pal, index) {
            const n = pal.steps.length;
            if (index == null || index < 0 || index >= n) {
                pal.selected = null;
                delete pal.selectedT;
                return;
            }
            pal.selected = index;
            pal.selectedT = stepPinT(pal.steps[index], index, n);
        }

        function resamplePaletteSteps(pal, newCount) {
            const oldSteps = pal.steps;
            const oldN = oldSteps.length;
            const n = Math.max(2, Math.min(24, newCount));
            if (oldN < 1 || oldN === n) {
                pal.steps.length = n;
                return;
            }

            const pinnedSnapshots = oldSteps
                .map((step, i) => ({
                    t: stepPinT(step, i, oldN),
                    h: step.h,
                    s: step.s,
                    l: step.l,
                    hex: step.hex,
                    pinned: !!step.pinned
                }))
                .filter(s => s.pinned);

            const newSteps = Array.from({ length: n }, (_, i) => {
                const t = i / (n - 1);
                const pos = t * (oldN - 1);
                const i0 = Math.floor(pos);
                const i1 = Math.min(i0 + 1, oldN - 1);
                const frac = i1 === i0 ? 0 : pos - i0;
                const a = oldSteps[i0];
                const b = oldSteps[i1];
                const h = a.h + (b.h - a.h) * frac;
                const s = a.s + (b.s - a.s) * frac;
                const l = a.l + (b.l - a.l) * frac;
                return {
                    h, s, l,
                    hex: modelToHex(h, s, l) ?? a.hex,
                    pinned: false
                };
            });

            const pinAssignments = assignPinsToIndices(pinnedSnapshots, n);
            for (const { pin, idx } of pinAssignments) {
                newSteps[idx] = {
                    h: pin.h,
                    s: pin.s,
                    l: pin.l,
                    hex: pin.hex,
                    pinned: true,
                    pinT: pin.t
                };
            }

            pal.steps = newSteps;

            if (pal.selected != null || pal.selectedT != null) {
                const selT = pal.selectedT != null
                    ? pal.selectedT
                    : stepPinT(oldSteps[pal.selected], pal.selected, oldN);
                pal.selected = remapIndexByT(selT, n, pinAssignments);
                pal.selectedT = selT;
            }

            if (pal.hexEditIndex != null) {
                const editT = pal.hexEditT != null
                    ? pal.hexEditT
                    : (oldN > 1 ? pal.hexEditIndex / (oldN - 1) : 0);
                pal.hexEditIndex = remapIndexByT(editT, n, pinAssignments);
                pal.hexEditT = editT;
                pal.selected = pal.hexEditIndex;
                pal.selectedT = editT;
            }
        }

        function setSharedStepCount(n) {
            pushHistory();
            sharedStepCount = Math.max(2, Math.min(24, n));
            palettes.forEach(pal => {
                resamplePaletteSteps(pal, sharedStepCount);
                if (isAnchorMode(pal)) applyAnchorInterpAll(pal);
                else if (pal.lInterp) applyLInterp(pal);
            });
            render();
            afterPrimaryPaletteChange();
        }

        function updateStepCountLabels() {
            document.querySelectorAll('.step-count').forEach(el => {
                el.textContent = sharedStepCount;
            });
        }

        function createPalette(n, baseHex, bgHex) {
            return {
                steps: Array.from({ length: Math.max(2, n) }, () => ({
                    h: 0, s: 0, l: 50, hex: '#808080', pinned: false
                })),
                selected: null,
                hexEditIndex: null,
                contrastEditIndex: null,
                contrastEditKind: null,
                baseHex: baseHex || DEFAULT_HEX,
                bgHex: bgHex || DEFAULT_BG,
                bgPreview: false,
                hRamp: false,
                sRamp: false,
                hPinView: false,
                sPinView: false,
                lInterp: false,
                lInterpPinView: false,
                valEdit: null,
                darkMode: false,
                dmContrastMetric: 'wcag',
                darkModeWcagTargets: null,
                darkModeApcaTargets: null,
                darkModeRefBg: null,
                dmMasterContrastSnap: null,
                dmGain: 0,
                dmGainRamp: false,
                dmGainStart: 0,
                dmGainEnd: 0,
                dmGainBezier: [0, 0, 1, 1],
                interpCurves: {},
                dmBaseL: null
            };
        }

        function hasPalettePins(pal) {
            return countPinned(pal) > 0;
        }

        function hsPinViewEnabled(pal, prop) {
            return prop === 'h' ? !!pal.hPinView : !!pal.sPinView;
        }

        const PIN_VIEW_LABEL_PINS = 'S piny';
        const PIN_VIEW_LABEL_NO_PINS = 'Bez pinů';

        function propPinViewEnabled(pal, prop) {
            if (prop === 'l') return !!pal.lInterp && !!pal.lInterpPinView;
            if (prop === 'h') return hsPinViewEnabled(pal, 'h');
            if (prop === 's') return hsPinViewEnabled(pal, 's');
            return false;
        }

        function syncPinViewToggleButtons(block, pal) {
            block.querySelectorAll('.pin-view-btn').forEach(btn => {
                const prop = btn.dataset.prop;
                if (!prop) return;
                const withPins = propPinViewEnabled(pal, prop);
                btn.textContent = withPins ? PIN_VIEW_LABEL_NO_PINS : PIN_VIEW_LABEL_PINS;
                btn.setAttribute('aria-pressed', withPins ? 'true' : 'false');
                btn.setAttribute('aria-label', withPins
                    ? `Režim s piny. Přepnout na ${PIN_VIEW_LABEL_NO_PINS.toLowerCase()}.`
                    : `Režim bez pinů. Přepnout na ${PIN_VIEW_LABEL_PINS.toLowerCase()}.`);
            });
        }

        function usePropPinHandles(pal, prop) {
            if (!isAnchorMode(pal)) return false;
            if (pal.selected !== null) return false;
            if (prop === 'l') return !!pal.lInterp && !!pal.lInterpPinView;
            if (prop === 'h' || prop === 's') return hsPinViewEnabled(pal, prop);
            return false;
        }

        function useLPinHandles(pal) {
            return usePropPinHandles(pal, 'l');
        }

        function clampPinProp(prop, raw) {
            let v = parseFloat(raw);
            if (prop === 'h') return Math.max(0, Math.min(360, Math.round(v)));
            return Math.max(0, Math.min(100, Math.round(v * 10) / 10));
        }

        function formatPinVal(prop, v) {
            if (prop === 'h') return `${Math.round(v)}°`;
            return v.toFixed(1);
        }

        function applyAnchorInterpProp(pal, prop) {
            const anchors = getPinnedIndices(pal);
            if (anchors.length < 2) return;
            for (let a = 0; a < anchors.length - 1; a++) {
                const i0 = anchors[a];
                const i1 = anchors[a + 1];
                const v0 = pal.steps[i0][prop];
                const v1 = pal.steps[i1][prop];
                const bez = getInterpCurve(pal, prop, a);
                for (let i = i0 + 1; i < i1; i++) {
                    const t = (i - i0) / (i1 - i0);
                    const e = sampleInterpBezier(t, bez);
                    if (prop === 'h') pal.steps[i].h = lerpHue(v0, v1, e);
                    else pal.steps[i][prop] = v0 + (v1 - v0) * e;
                }
            }
            refreshStepHex(pal);
        }

        /** Přepočítá jen mezilehlé kroky mezi piny; hodnoty pinů (včetně z hexu) nemění. */
        function applyAnchorInterpAll(pal) {
            if (!isAnchorMode(pal)) return;
            applyAnchorInterpProp(pal, 'h');
            applyAnchorInterpProp(pal, 's');
            if (pal.lInterp) applyAnchorInterpL(pal);
        }

        function applyHsAnchorPalette(pal) {
            applyAnchorInterpAll(pal);
        }

        function applyPinPropInterp(pal, prop) {
            if (prop === 'l') applyAnchorInterpL(pal);
            else if (prop === 'h' || prop === 's') applyAnchorInterpProp(pal, prop);
        }

        function lerpHue(h0, h1, t) {
            const d = ((h1 - h0 + 540) % 360) - 180;
            return ((h0 + d * t) % 360 + 360) % 360;
        }

        function exitLInterp(pal) {
            pal.lInterp = false;
            pal.lInterpPinView = false;
        }

        function ensureAnchorPinDefaults(pal) {
            if (!isAnchorMode(pal)) return;
            pal.hPinView = true;
            pal.sPinView = true;
            pal.lInterpPinView = true;
            ensureInterpCurvesForPalette(pal, 'h');
            ensureInterpCurvesForPalette(pal, 's');
            ensureInterpCurvesForPalette(pal, 'l');
        }

        function applyAnchorInterpL(pal) {
            const anchors = getPinnedIndices(pal);
            if (anchors.length < 2) return;
            for (let a = 0; a < anchors.length - 1; a++) {
                const i0 = anchors[a];
                const i1 = anchors[a + 1];
                const l0 = pal.steps[i0].l;
                const l1 = pal.steps[i1].l;
                const bez = getInterpCurve(pal, 'l', a);
                for (let i = i0 + 1; i < i1; i++) {
                    const t = (i - i0) / (i1 - i0);
                    const e = sampleInterpBezier(t, bez);
                    pal.steps[i].l = l0 + (l1 - l0) * e;
                }
            }
            refreshStepHex(pal);
        }

        function applyLInterp(pal) {
            if (isAnchorMode(pal)) applyAnchorInterpL(pal);
            else applyPropRamp(pal, 'l');
        }

        function enterLInterp(block, pal) {
            pushHistory();
            pal.lInterp = true;
            if (hasPalettePins(pal)) pal.lInterpPinView = true;
            ensureInterpCurvesForPalette(pal, 'l');
            const wrap = block.querySelector('.slider-ramp-wrap[data-prop="l"]');
            if (!wrap) return;
            if (useLPinHandles(pal)) {
                renderPinMarkers(block, pal, 'l');
            } else {
                const minIn = wrap.querySelector('.ramp-min');
                const maxIn = wrap.querySelector('.ramp-max');
                minIn.value = pal.steps[0].l;
                maxIn.value = pal.steps[pal.steps.length - 1].l;
            }
            applyLInterp(pal);
            syncEditor(block, pal);
            updateSwatches(block, pal);
            if (isPrimaryPalette(pal)) afterPrimaryPaletteChange();
        }

        function setLInterpPinView(block, pal, withPins) {
            if (!pal.lInterp || !hasPalettePins(pal)) return;
            pal.lInterpPinView = withPins;
            const wrap = block.querySelector('.slider-ramp-wrap[data-prop="l"]');
            if (!wrap) return;
            if (withPins) {
                renderPinMarkers(block, pal, 'l');
            } else {
                const minIn = wrap.querySelector('.ramp-min');
                const maxIn = wrap.querySelector('.ramp-max');
                minIn.value = pal.steps[0].l;
                maxIn.value = pal.steps[pal.steps.length - 1].l;
            }
            syncEditor(block, pal);
        }

        function setHsPinView(block, pal, prop, withPins) {
            if (!isAnchorMode(pal) || (prop !== 'h' && prop !== 's')) return;
            if (prop === 'h') pal.hPinView = withPins;
            else pal.sPinView = withPins;
            const wrap = block.querySelector(`.slider-ramp-wrap[data-prop="${prop}"]`);
            if (!wrap) return;
            if (withPins) {
                renderPinMarkers(block, pal, prop);
            } else {
                const minIn = wrap.querySelector('.ramp-min');
                const maxIn = wrap.querySelector('.ramp-max');
                const n = pal.steps.length;
                minIn.value = pal.steps[0][prop];
                maxIn.value = pal.steps[n - 1][prop];
                if (prop === 'h') pal.hRamp = true;
                else pal.sRamp = true;
            }
            syncEditor(block, pal);
        }

        function updatePinValDisplay(block, pal, prop) {
            const anchors = getPinnedIndices(pal);
            setValDisplay(block, pal, prop,
                anchors.map(i => formatPinVal(prop, pal.steps[i][prop])), '·');
        }

        function renderPinMarkers(block, pal, prop) {
            const wrap = block.querySelector(`.slider-ramp-wrap[data-prop="${prop}"]`);
            const container = wrap?.querySelector('.pin-handles');
            if (!container) return;
            container.replaceChildren();
            const anchors = getPinnedIndices(pal);
            anchors.forEach((stepIdx, ai) => {
                const hint = document.createElement('span');
                hint.className = 'pin-hint-marker';
                hint.dataset.anchorIdx = String(ai);
                hint.textContent = String(ai + 1);
                const thumb = document.createElement('span');
                thumb.className = 'pin-thumb';
                thumb.dataset.anchorIdx = String(ai);
                container.append(hint, thumb);
            });
            container.dataset.pinKey = anchors.join(',');
            updatePinMarkerPositions(block, pal, prop);

        function updatePinMarkerPositions(block, pal, prop) {
            const wrap = block.querySelector(`.slider-ramp-wrap[data-prop="${prop}"]`);
            if (!wrap) return;
            const { min, max } = rampRange(prop);
            const anchors = getPinnedIndices(pal);
            const trackW = wrap.getBoundingClientRect().width || 1;
            anchors.forEach((stepIdx, ai) => {
                const centerPct = valueToTrackPct(pal.steps[stepIdx][prop], min, max, trackW);
                const hint = wrap.querySelector(`.pin-hint-marker[data-anchor-idx="${ai}"]`);
                const thumb = wrap.querySelector(`.pin-thumb[data-anchor-idx="${ai}"]`);
                if (hint) setHintLeftFromCenterPct(hint, wrap, centerPct);
                if (thumb) thumb.style.left = centerPct + '%';
            });
        }

        function pickPinHandle(wrap, pal, prop, clientX) {
            const anchors = getPinnedIndices(pal);
            const rect = wrap.getBoundingClientRect();
            if (!rect.width || anchors.length === 0) return -1;
            const { min, max } = rampRange(prop);
            const x = clientX - rect.left;
            let best = 0;
            let bestD = Infinity;
            for (let a = 0; a < anchors.length; a++) {
                const v = pal.steps[anchors[a]][prop];
                const cx = (valueToTrackPct(v, min, max, rect.width) / 100) * rect.width;
                const d = Math.abs(x - cx);
                if (d < bestD) {
                    bestD = d;
                    best = a;
                }
            }
            return best;
        }

        function showPinHints(wrap, anchorIdx) {

        function onPinSlider(block, pal, prop, anchorIdx, raw) {

            applyPinPropInterp(pal, prop);
            updatePinMarkerPositions(block, pal, prop);
            updatePinValDisplay(block, pal, prop);
            updateSliderTrack(block, pal, prop);
            updateSwatches(block, pal);
            if (isPrimaryPalette(pal)) afterPrimaryPaletteChange();

        function applyPropRamp(pal, prop) {
            const n = pal.steps.length;
            if (n < 2) return;
            const start = pal.steps[0][prop];
            const end = pal.steps[n - 1][prop];
            const bez = getInterpCurve(pal, prop, 0);
            for (let i = 0; i < n; i++) {
                const t = i / (n - 1);
                const e = sampleInterpBezier(t, bez);
                pal.steps[i][prop] = start + (end - start) * e;
                pal.steps[i].hex = modelToHex(pal.steps[i].h, pal.steps[i].s, pal.steps[i].l) ?? pal.steps[i].hex;
            }

        function refreshStepHex(pal) {
            pal.steps.forEach(step => {
                step.hex = modelToHex(step.h, step.s, step.l) ?? step.hex;
            });

        function countPinned(pal) {
            return pal.steps.filter(s => s.pinned).length;

        function isAnchorMode(pal) {

        function getPinnedIndices(pal) {

        function applyStepFromHex(block, pal, index, raw) {
            const step = pal.steps[index];
            if (!step || !canEditStepHex(pal, step)) return false;
            const norm = normalizeHex(sanitizeHexInput(raw));
            if (!norm) return false;
            const m = hexToModel(norm);
            if (!m) return false;
            pushHistory();
            step.h = m.h;
            step.s = m.s;
            step.l = m.l;
            step.hex = modelToHex(m.h, m.s, m.l) ?? norm;
            cancelHexEdit(pal);
            setSelection(pal, index);
            if (!isAnchorMode(pal)) {
                exitLInterp(pal);
            } else {
                applyAnchorInterpAll(pal);
            }
            updateSwatches(block, pal);
            syncEditor(block, pal);
            if (isPrimaryPalette(pal)) afterPrimaryPaletteChange();
            return true;
        }

        function cancelHexEdit(pal) {
            pal.hexEditIndex = null;
            delete pal.hexEditT;
            cancelContrastEdit(pal);

            const step = pal.steps[index];
            if (!step.pinned) {
                step.pinned = true;
                step.pinT = n > 1 ? index / (n - 1) : 0;
                pal.steps[0].pinned = true;
                pal.steps[0].pinT = 0;
                pal.steps[n - 1].pinned = true;
                pal.steps[n - 1].pinT = 1;

                pal.sRamp = false;

                if (left === 1) clearAllPins(pal);

                pal.hPinView = false;
                pal.sPinView = false;

                if (!wasAnchor) ensureAnchorPinDefaults(pal);

            syncEditor(block, pal);

        function findClosestStepIdx(steps, seed) {
            let idx = 0;
            let best = Infinity;
            for (let i = 0; i < steps.length; i++) {
                const d = Math.abs(steps[i].l - seed.l);
                if (d < best) {
                    best = d;
                    idx = i;
                }
            }
            return idx;
        }

        function defaultStepL(i, n, seedL) {
            return n === 1 ? seedL : L_START + (L_END - L_START) * (i / (n - 1));

        function generatePalette(pal, selectClosest = false) {
            const seed = hexToModel(pal.baseHex);
            if (!seed) return;

            const n = Math.max(2, pal.steps.length);
            const oldSteps = pal.steps.slice(0, n);
            const useDefaultL = isPlaceholderPalette(oldSteps);

            pal.steps = Array.from({ length: n }, (_, i) => {
                const old = oldSteps[i];
                const l = useDefaultL
                    ? defaultStepL(i, n, seed.l)
                    : (old?.l ?? defaultStepL(i, n, seed.l));
                const h = seed.h;
                let s = seed.s;
                if (colorSpace === 'hct') {
                    s = clampHctChromaForStep(h, s, l);
                }
                const hex = modelToHex(h, s, l) ?? pal.baseHex;
                const step = { h, s, l, hex, pinned: !!old?.pinned };
                if (old?.pinT != null) step.pinT = old.pinT;
                return step;
            });

            pal.valEdit = null;
            pal.hexEditIndex = null;
            cancelContrastEdit(pal);

            if (isAnchorMode(pal)) {
                applyAnchorInterpAll(pal);
            } else {
                refreshStepHex(pal);
            }

            if (selectClosest) {
                setSelection(pal, findClosestStepIdx(pal.steps, seed));
            } else if (pal.selected != null) {
                setSelection(pal, Math.min(pal.selected, n - 1));
            }
        }

        function addPalette() {

            const ref = palettes[palettes.length - 1];
            const pal = createPalette(
                sharedStepCount,
                ref?.baseHex ?? DEFAULT_HEX,

            generatePalette(pal);
            palettes.push(pal);
            render();

        function toggleSwatchChipsLocked(block) {
            const row = getPaletteRow(block);

            if (row.dataset.chipsLocked === '1') {
                delete row.dataset.chipsLocked;
                row.classList.remove('chips-visible', 'chips-locked');

                lockSwatchChipsVisible(block);

        function wireSwatchNextChip(chip, block) {
            const row = () => getPaletteRow(block);

            chip.addEventListener('mouseenter', () => {
                const r = row();
                if (!r || r.dataset.chipsLocked === '1') return;
                r.classList.add('chips-visible');
            });
            chip.addEventListener('mouseleave', (e) => {
                const r = row();
                if (!r || r.dataset.chipsLocked === '1') return;
                const rel = e.relatedTarget;
                if (rel && r.contains(rel) && rel.closest('.swatch-next-chip')) return;
                r.classList.remove('chips-visible');
            });
            chip.addEventListener('click', () => {
                toggleSwatchChipsLocked(block);
            });

        function updateSwatches(block, pal) {

            row.replaceChildren();
            pal.steps.forEach((step, si) => {
                const el = document.createElement('div');
                el.className = `swatch ${isLightHex(step.hex) ? 'light' : 'dark'}${pal.selected === si ? ' selected' : ''}`;
                el.dataset.step = String(si);

                nameEl.className = 'swatch-name';

                pinBtn.type = 'button';
                pinBtn.className = 'swatch-pin';
                pinBtn.appendChild(pinSvg());
                updatePinButton(pinBtn, !!step.pinned);
                pinBtn.onclick = (e) => {

                    togglePin(block, pal, si);

                nextChip.style.background = chipFgHex;

        function rampRange(prop) {

            hint.style.opacity = '1';

            hint.style.visibility = prevVis;
            hint.style.opacity = prevOp;
